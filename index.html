<!DOCTYPE html>
<html>
<head>
  <title>Control de Acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #e9eef5, #dfe7f1);
      margin: 0;
      text-align: center;
    }

    .header {
      background: white;
      padding: 10px 0;
      border-bottom: 2px solid #0b3d91;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .header img {
      width: 55%;
      max-width: 200px;
    }

    .container {
      background: white;
      width: 90%;
      max-width: 380px;
      margin: 30px auto;
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h2 {
      margin-bottom: 10px;
      color: #0b3d91;
      font-weight: 700;
      font-size: 24px;
    }

    .mensaje {
      font-size: 13px;
      color: #444;
      margin-bottom: 15px;
      min-height: 20px;
    }

    input, select {
      width: 80%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 14px;
      outline: none;
      transition: 0.2s;
      font-family: 'Inter', sans-serif;
    }

    input:focus, select:focus {
      border-color: #0b3d91;
      box-shadow: 0 0 0 2px rgba(11,61,145,0.1);
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.02);
    }

    .ingreso {
      background: #0b3d91;
    }

    .ingreso:hover {
      background: #092f6f;
    }

    .salida {
      background: #c62828;
    }

    .salida:hover {
      background: #a61e1e;
    }

    .footer {
      font-size: 11px;
      margin-top: 20px;
      line-height: 1.4;
    }

    .footer .departamento {
      color: #0b3d91;
      font-weight: 700;
    }

    .footer .corporacion {
      color: #000;
      font-weight: 700;
    }
  </style>
</head>

<body>

<div class="header">
  <img src="https://i.imgur.com/OB279U8.jpeg">
</div>

<div class="container">

  <h2>Control de Acceso</h2>

  <div class="mensaje" id="mensaje"></div>

  <input id="docInput" placeholder="Número de documento">

  <!-- VERSION PRO -->
  <select id="rolManual">
    <option value="">Defina su rol</option>
    <option value="Visitante">Visitante</option>
    <option value="Contratista">Contratista</option>
  </select>

  <button class="btn ingreso" onclick="irIngreso()">Ingreso</button>
  <button class="btn salida" onclick="irSalida()">Salida</button>

  <div class="footer">
    <div class="departamento">
      DEPARTAMENTO DE CONTROL INTERNO DE SEGURIDAD E INFRAESTRUCTURA
    </div>
    <div class="corporacion">
      CORPORACION COLEGIO INTERNACIONAL ALTAMIRA
    </div>
  </div>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";

let data = [];

async function cargarDatos() {
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0, -2));

    data = json.table.rows.map(r => {
      const c = (r.c || []).map(x => x ? x.v : "");

      return {
        tipo: limpiarTexto(c[1]),
        doc: limpiarTexto(c[2]),
        nombre: limpiarTexto(c[3]),
        rol: limpiarTexto(c[4]),
        entidad: limpiarTexto(c[5]),
        placa: limpiarTexto(c[6]),
        contacto: limpiarTexto(c[8]),
        emergencia: limpiarTexto(c[9]),
        parentesco: normalizarParentesco(c[11])
      };
    });

  } catch (e) {
    alert("Error cargando base de datos");
  }
}

window.onload = cargarDatos;

function limpiarTexto(texto) {
  return String(texto || "").replace(/\s+/g, " ").trim();
}

function limpiarDoc(doc) {
  return String(doc || "").replace(/\s+/g, "").trim();
}

function normalizarParentesco(valor) {
  const v = limpiarTexto(valor).toLowerCase();

  if (v.includes("espos")) return "Esposa/o";
  if (v.includes("hij")) return "Hija/o";
  if (v.includes("herman")) return "Hermana/o";
  if (v.includes("amig")) return "Amiga/o";

  return "Otros:";
}

function getUser() {
  const doc = limpiarDoc(document.getElementById("docInput").value);
  if (!doc) return null;
  return data.find(u => limpiarDoc(u.doc) === doc);
}

/* MENSAJE */
document.getElementById("docInput").addEventListener("input", function() {

  const user = getUser();
  const mensaje = document.getElementById("mensaje");

  if (!this.value) {
    mensaje.innerText = "";
    return;
  }

  if (user) {
    const nombre = user.nombre.split(" ")[0];
    mensaje.innerText = "Bienvenido nuevamente, " + nombre + " 👋";
  } else {
    mensaje.innerText = "Bienvenido a nuestras instalaciones 😊";
  }
});

/* INGRESO */
function irIngreso() {

  const input = document.getElementById("docInput").value.trim();
  const rolManual = document.getElementById("rolManual").value;

  if (!input) {
    alert("Debe ingresar documento");
    return;
  }

  if (!rolManual) {
    alert("Seleccione un rol");
    return;
  }

  const user = getUser();

  const form = "https://docs.google.com/forms/d/e/1FAIpQLSd0NQ4XvHoMeSLRNJvas_t_7ufz9QxDUHf3erdBoiXqzd-aVQ/viewform";

  /* SI NO EXISTE */
  if (!user) {

    const url =
      form +
      "?usp=pp_url" +
      "&entry.2145689969=" + encodeURIComponent(rolManual);

    window.location.href = url;
    return;
  }

  /* AUTORELLENO */
  const url =
    form +
    "?usp=pp_url" +
    "&entry.2145689969=" + encodeURIComponent(rolManual) +
    "&entry.1467518674=" + encodeURIComponent(user.nombre) +
    "&entry.759778662=" + encodeURIComponent(user.tipo) +
    "&entry.1067239809=" + encodeURIComponent(user.doc) +
    "&entry.260712750=" + encodeURIComponent(user.contacto) +
    "&entry.1453302831=" + encodeURIComponent(user.entidad) +
    "&entry.1270164542=" + encodeURIComponent(user.placa) +
    "&entry.921499438=" + encodeURIComponent(user.emergencia) +
    "&entry.305397915=" + encodeURIComponent(user.parentesco);

  window.location.href = url;
}

/* SALIDA */
function irSalida() {

  const input = document.getElementById("docInput").value.trim();

  if (!input) {
    alert("Debe ingresar documento");
    return;
  }

  const user = getUser();

  if (!user) {
    alert("Usuario no encontrado");
    return;
  }

  const form = "https://docs.google.com/forms/d/e/1FAIpQLSedPNuvXarpvh2t9ssrBUa3AEPI8ZIu20CTpZa9tGcklEGKwQ/viewform";

  const url =
    form +
    "?usp=pp_url" +
    "&entry.861901166=" + encodeURIComponent(user.tipo) +
    "&entry.1077137573=" + encodeURIComponent(user.doc) +
    "&entry.232043619=" + encodeURIComponent(user.nombre) +
    "&entry.666367411=" + encodeURIComponent(user.contacto) +
    "&entry.2097525574=" + encodeURIComponent(user.rol) +
    "&entry.2053464900=" + encodeURIComponent(user.entidad);

  window.location.href = url;
}

/* ENTER */
document.getElementById("docInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") irIngreso();
});

</script>

</body>
</html>
