<!DOCTYPE html>
<html>
<head>
<title>Control de Acceso</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#e9eef5,#dfe7f1);
margin:0;
text-align:center;
}

.header{
background:white;
padding:10px 0;
border-bottom:2px solid #0b3d91;
}

.header img{
width:55%;
max-width:200px;
}

.container{
background:white;
width:90%;
max-width:380px;
margin:30px auto;
padding:25px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

h2{
color:#0b3d91;
font-size:24px;
margin-bottom:10px;
}

.mensaje{
font-size:13px;
margin-bottom:15px;
min-height:20px;
}

input,select{
width:80%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:14px;
font-family:'Inter',sans-serif;
}

.btn{
width:100%;
padding:13px;
border:none;
border-radius:12px;
color:white;
font-size:15px;
margin-bottom:12px;
cursor:pointer;
}

.ingreso{background:#0b3d91;}
.salida{background:#c62828;}

.footer{
font-size:11px;
margin-top:20px;
line-height:1.4;
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/OB279U8.jpeg">
</div>

<div class="container">

<h2>Control de Acceso</h2>

<div class="mensaje" id="mensaje"></div>

<input id="docInput" placeholder="Número de documento">

<select id="rolSelect">
<option value="">Defina su rol</option>
<option value="VISITANTE">VISITANTE</option>
<option value="CONTRATISTA">CONTRATISTA</option>
</select>

<button class="btn ingreso" onclick="irIngreso()">Ingreso</button>
<button class="btn salida" onclick="irSalida()">Salida</button>

<div class="footer">
DEPARTAMENTO DE CONTROL INTERNO DE SEGURIDAD E INFRAESTRUCTURA<br>
CORPORACION COLEGIO INTERNACIONAL ALTAMIRA
</div>

</div>

<script>

const SHEET_URL="https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";

let data=[];

async function cargarDatos(){
const res=await fetch(SHEET_URL);
const text=await res.text();
const json=JSON.parse(text.substring(47).slice(0,-2));

data=json.table.rows.map(r=>{
const c=(r.c||[]).map(x=>x?x.v:"");

return{
tipo:c[1]||"",
doc:c[2]||"",
nombre:c[3]||"",
rol:c[4]||"",
entidad:c[5]||"",
placa:c[6]||"",
contacto:c[8]||"",
emergencia:c[9]||"",
parentesco:c[11]||""
};
});
}

window.onload=cargarDatos;

function limpiar(v){
return String(v||"").trim();
}

function getUser(){
const doc=limpiar(document.getElementById("docInput").value);
return data.find(x=>limpiar(x.doc)==doc);
}

document.getElementById("docInput").addEventListener("input",function(){

const user=getUser();
const m=document.getElementById("mensaje");

if(!this.value){
m.innerText="";
return;
}

if(user){
m.innerText="Bienvenido nuevamente, "+user.nombre.split(" ")[0]+" 👋";
}else{
m.innerText="Bienvenido a nuestras instalaciones 😊";
}

});

function irIngreso(){

const doc=document.getElementById("docInput").value.trim();
const rol=document.getElementById("rolSelect").value;

if(!doc){
alert("Ingrese documento");
return;
}

if(!rol){
alert("Seleccione rol");
return;
}

const user=getUser();

const form="https://docs.google.com/forms/d/e/1FAIpQLSd0NQ4XvHoMeSLRNJvas_t_7ufz9QxDUHf3erdBoiXqzd-aVQ/viewform";

if(!user){

window.location.href=
form+
"?usp=pp_url"+
"&entry.1086354848="+encodeURIComponent(rol);

return;
}

const url=
form+
"?usp=pp_url"+
"&entry.1086354848="+encodeURIComponent(rol)+
"&entry.1899230705="+encodeURIComponent(user.nombre)+
"&entry.2083119061="+encodeURIComponent(user.tipo)+
"&entry.311902120="+encodeURIComponent(user.doc)+
"&entry.477144471="+encodeURIComponent(user.contacto)+
"&entry.1527361506="+encodeURIComponent(user.entidad)+
"&entry.1268448003="+encodeURIComponent(user.placa)+
"&entry.1316902717="+encodeURIComponent(user.emergencia)+
"&entry.539345216="+encodeURIComponent(user.parentesco)+
"&entry.1651701540="+encodeURIComponent(user.rol);

window.location.href=url;
}

function irSalida(){
alert("Salida sigue igual.");
}

document.getElementById("docInput").addEventListener("keypress",function(e){
if(e.key==="Enter") irIngreso();
});

</script>

</body>
</html>
