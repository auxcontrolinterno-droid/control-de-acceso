<!DOCTYPE html>
<html>
<head>
  <title>Control de Acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e9eef5;
      margin: 0;
      text-align: center;
    }

    .header {
      background: white;
      padding: 5px 0;
      border-bottom: 2px solid #0b3d91;
    }

    .header img {
      width: 65%;
      max-width: 240px;
    }

    .container {
      background: white;
      width: 90%;
      max-width: 360px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }

    input {
      width: 70%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      color: white;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .ingreso { background: #0b3d91; }
    .salida { background: #c62828; }
  </style>
</head>

<body>

<div class="header">
  <img src="https://i.imgur.com/OB279U8.jpeg">
</div>

<div class="container">

  <h2>Control de Acceso</h2>

  <input id="docInput" placeholder="Número de documento">

  <button class="btn ingreso" onclick="irIngreso()">Ingreso</button>
  <button class="btn salida" onclick="irSalida()">Salida</button>

</div>

<script>

// 🔥 URLs de hojas
const INGRESOS_URL = "https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";
const SALIDAS_URL  = "https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=0&tqx=out:json"; // ⚠️ CAMBIA ESTE GID

let ingresos = [];
let salidas = [];

// ================= CARGAR DATOS =================
async function cargarDatos() {
  ingresos = await cargarHoja(INGRESOS_URL);
  salidas  = await cargarHoja(SALIDAS_URL);

  console.log("Ingresos:", ingresos.length);
  console.log("Salidas:", salidas.length);
}

async function cargarHoja(url) {
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0, -2));

  return json.table.rows.map(r => {
    const c = (r.c || []).map(x => x ? x.v : "");
    return {
      doc: limpiar(c[2]),
      nombre: limpiar(c[3]),
      tipo: limpiar(c[1]),
      rol: limpiar(c[4]),
      entidad: limpiar(c[5]),
      placa: limpiar(c[6]),
      contacto: limpiar(c[8]),
      emergencia: limpiar(c[9]),
      parentesco: normalizarParentesco(c[11])
    };
  });
}

window.onload = cargarDatos;

// ================= UTIL =================
function limpiar(t) {
  return String(t || "").replace(/\s+/g, "").trim();
}

function normalizarParentesco(v) {
  v = String(v || "").toLowerCase();

  if (v.includes("espos")) return "Esposa/o";
  if (v.includes("hij")) return "Hija/o";
  if (v.includes("herman")) return "Hermana/o";
  if (v.includes("amig")) return "Amiga/o";

  return "Otros:";
}

// ================= ESTADO REAL =================
function estaDentro(doc) {

  const entradas = ingresos.filter(u => u.doc === doc).length;
  const salidasCount = salidas.filter(u => u.doc === doc).length;

  return entradas > salidasCount;
}

// ================= INGRESO =================
function irIngreso() {

  const doc = limpiar(document.getElementById("docInput").value);

  if (!doc) {
    alert("Ingrese documento");
    return;
  }

  if (estaDentro(doc)) {
    alert("Esta persona ya está dentro. Debe salir primero.");
    return;
  }

  const user = ingresos.find(u => u.doc === doc);

  const url = "https://docs.google.com/forms/d/e/1FAIpQLSd0NQ4XvHoMeSLRNJvas_t_7ufz9QxDUHf3erdBoiXqzd-aVQ/viewform?usp=pp_url"
    + "&entry.2083119061=" + user.tipo
    + "&entry.311902120=" + user.doc
    + "&entry.1899230705=" + user.nombre
    + "&entry.477144471=" + user.contacto
    + "&entry.2145689969=" + user.rol
    + "&entry.1527361506=" + user.entidad
    + "&entry.1268448003=" + user.placa
    + "&entry.1316902717=" + user.emergencia
    + "&entry.539345216=" + user.parentesco;

  window.location.href = url;
}

// ================= SALIDA =================
function irSalida() {

  const doc = limpiar(document.getElementById("docInput").value);

  if (!doc) {
    alert("Ingrese documento");
    return;
  }

  if (!estaDentro(doc)) {
    alert("Esta persona no está dentro.");
    return;
  }

  const user = ingresos.find(u => u.doc === doc);

  const url = "https://docs.google.com/forms/d/e/1FAIpQLSedPNuvXarpvh2t9ssrBUa3AEPI8ZIu20CTpZa9tGcklEGKwQ/viewform?usp=pp_url"
    + "&entry.861901166=" + user.tipo
    + "&entry.1077137573=" + user.doc
    + "&entry.232043619=" + user.nombre
    + "&entry.666367411=" + user.contacto
    + "&entry.2097525574=" + user.rol
    + "&entry.2053464900=" + user.entidad
    + "&entry.335364680=" + user.placa
    + "&entry.1230591168=" + user.emergencia
    + "&entry.620468493=" + user.parentesco;

  window.location.href = url;
}

</script>

</body>
</html>
