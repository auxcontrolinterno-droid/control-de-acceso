<!DOCTYPE html>
<html>
<head>
  <title>Control de Acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Inter',sans-serif;
      background:linear-gradient(135deg,#e9eef5,#dfe7f1);
      margin:0;
      text-align:center;
    }

    .header{
      background:white;
      padding:10px 0;
      border-bottom:2px solid #0b3d91;
      box-shadow:0 2px 6px rgba(0,0,0,.05);
    }

    .header img{
      width:55%;
      max-width:200px;
    }

    .container{
      background:white;
      width:90%;
      max-width:380px;
      margin:30px auto;
      padding:25px;
      border-radius:18px;
      box-shadow:0 10px 25px rgba(0,0,0,.08);
    }

    h2{
      margin-bottom:10px;
      color:#0b3d91;
      font-size:24px;
      font-weight:700;
    }

    .mensaje{
      font-size:13px;
      color:#444;
      margin-bottom:15px;
      min-height:20px;
    }

    input,select{
      width:80%;
      padding:12px;
      border-radius:10px;
      border:1px solid #ccc;
      margin-bottom:14px;
      outline:none;
      font-family:'Inter',sans-serif;
    }

    .btn{
      width:100%;
      padding:13px;
      border:none;
      border-radius:12px;
      color:white;
      font-size:15px;
      margin-bottom:12px;
      cursor:pointer;
      font-family:'Inter',sans-serif;
    }

    .ingreso{ background:#0b3d91; }
    .salida{ background:#c62828; }

    .hidden{ display:none; }

    .footer{
      font-size:11px;
      margin-top:20px;
      line-height:1.4;
    }

    .footer .departamento{
      color:#0b3d91;
      font-weight:700;
    }

    .footer .corporacion{
      color:#000;
      font-weight:700;
    }
  </style>
</head>

<body>

<div class="header">
  <img src="https://i.imgur.com/OB279U8.jpeg">
</div>

<div class="container">

  <h2>Control de Acceso</h2>

  <div class="mensaje" id="mensaje"></div>

  <!-- ROL -->
  <select id="rolSelect" onchange="cambiarVista()">
    <option value="">Defina su rol</option>
    <option value="VISITANTE">Visitante</option>
    <option value="CONTRATISTA">Contratista</option>
  </select>

  <!-- CÉDULA -->
  <div id="zonaCedula" class="hidden">
    <input id="docInput" placeholder="Número de documento">
  </div>

  <!-- BOTONES -->
  <div id="zonaIngreso" class="hidden">
    <button class="btn ingreso" onclick="irIngreso()">Ingreso</button>
  </div>

  <div id="zonaSalida" class="hidden">
    <button class="btn salida" onclick="irSalida()">Salida</button>
  </div>

  <div class="footer">
    <div class="departamento">
      DEPARTAMENTO DE CONTROL INTERNO DE SEGURIDAD E INFRAESTRUCTURA
    </div>
    <div class="corporacion">
      CORPORACION COLEGIO INTERNACIONAL ALTAMIRA
    </div>
  </div>

</div>

<script>

/* =======================
   BASE DE DATOS INGRESOS
======================= */

const SHEET_URL = "https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";

let data = [];

async function cargarDatos(){
  try{
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0,-2));

    data = json.table.rows.map(r =>
      (r.c || []).map(x => x ? x.v : "")
    );

  }catch(e){
    console.log("Error cargando base");
  }
}

window.onload = cargarDatos;

/* =======================
   BUSCAR USUARIO
======================= */

function getUser(){
  const doc = document.getElementById("docInput").value.trim();
  return data.find(u => String(u[2]).trim() === doc);
}

/* =======================
   CAMBIO DE VISTA
======================= */

function cambiarVista(){

  document.getElementById("zonaCedula").classList.remove("hidden");
  document.getElementById("zonaIngreso").classList.remove("hidden");

  const rol = document.getElementById("rolSelect").value;

  if(rol === "CONTRATISTA"){
    document.getElementById("zonaSalida").classList.remove("hidden");
  }else{
    document.getElementById("zonaSalida").classList.add("hidden");
  }
}

/* =======================
   INGRESO
======================= */

function irIngreso(){

  const doc = document.getElementById("docInput").value.trim();

  if(!doc){
    alert("Ingrese documento");
    return;
  }

  const user = getUser();

  if(!user){
    alert("Usuario no encontrado");
    return;
  }

  const form =
  "https://docs.google.com/forms/d/e/1FAIpQLSd0NQ4XvHoMeSLRNJvas_t_7ufz9QxDUHf3erdBoiXqzd-aVQ/formResponse";

  const url =
  form +
  "?entry.1086354848=" + encodeURIComponent(document.getElementById("rolSelect").value) +
  "&entry.1899230705=" + encodeURIComponent(user[3]) +
  "&entry.2083119061=" + encodeURIComponent(user[4]) +
  "&entry.311902120=" + encodeURIComponent(user[2]);

  window.location.href = url;
}

/* =======================
   SALIDA (CORREGIDA)
======================= */

function irSalida(){

  const doc = document.getElementById("docInput").value.trim();

  if(!doc){
    alert("Ingrese documento");
    return;
  }

  const user = getUser();

  if(!user){
    alert("Usuario no encontrado");
    return;
  }

  const rolFinal = document.getElementById("rolSelect").value;

  const form =
  "https://docs.google.com/forms/d/e/1FAIpQLSedPNuvXarpvh2t9ssrBUa3AEPI8ZIu20CTpZa9tGcklEGKwQ/formResponse";

  const url =
  form +
  "?entry.349719305=" + encodeURIComponent(rolFinal) +
  "&entry.232043619=" + encodeURIComponent(user[3]) +
  "&entry.861901166=" + encodeURIComponent(user[4]) +
  "&entry.1077137573=" + encodeURIComponent(user[2]);

  window.location.href = url;
}

</script>

</body>
</html>
