<!DOCTYPE html>
<html>
<head>
  <title>Control de Acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Inter',sans-serif;
      background:linear-gradient(135deg,#e9eef5,#dfe7f1);
      margin:0;
      text-align:center;
    }

    .header{
      background:white;
      padding:10px 0;
      border-bottom:2px solid #0b3d91;
      box-shadow:0 2px 6px rgba(0,0,0,.05);
    }

    .header img{
      width:55%;
      max-width:200px;
    }

    .container{
      background:white;
      width:90%;
      max-width:380px;
      margin:30px auto;
      padding:25px;
      border-radius:18px;
      box-shadow:0 10px 25px rgba(0,0,0,.08);
    }

    h2{
      margin-bottom:10px;
      color:#0b3d91;
      font-size:24px;
      font-weight:700;
    }

    .mensaje{
      font-size:13px;
      color:#444;
      margin-bottom:15px;
      min-height:20px;
    }

    input,select{
      width:80%;
      padding:12px;
      border-radius:10px;
      border:1px solid #ccc;
      margin-bottom:14px;
      outline:none;
      font-family:'Inter',sans-serif;
    }

    .btn{
      width:100%;
      padding:13px;
      border:none;
      border-radius:12px;
      color:white;
      font-size:15px;
      margin-bottom:12px;
      cursor:pointer;
    }

    .ingreso{ background:#0b3d91; }
    .salida{ background:#c62828; }

    .hidden{ display:none; }

    .footer{
      font-size:11px;
      margin-top:20px;
      line-height:1.4;
    }

    .footer .departamento{
      color:#0b3d91;
      font-weight:700;
    }

    .footer .corporacion{
      color:#000;
      font-weight:700;
    }
  </style>
</head>

<body>

<div class="header">
  <img src="https://i.imgur.com/OB279U8.jpeg">
</div>

<div class="container">

  <h2>Control de Acceso</h2>

  <div class="mensaje" id="mensaje"></div>

  <!-- ROL -->
  <select id="rolSelect" onchange="cambiarVista()">
    <option value="">Defina su rol</option>
    <option value="VISITANTE">Visitante</option>
    <option value="CONTRATISTA">Contratista</option>
    <option value="PROVEEDOR">Proveedor</option>
  </select>

  <!-- CÉDULA -->
  <div id="zonaCedula" class="hidden">
    <input id="docInput" placeholder="Número de documento">
  </div>

  <!-- INGRESO -->
  <div id="zonaIngreso" class="hidden">
    <button class="btn ingreso" onclick="irIngreso()">Ingreso</button>
  </div>

  <!-- SALIDA -->
  <div id="zonaSalida" class="hidden">
    <button class="btn salida" onclick="irSalida()">Salida</button>
  </div>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";

let data = [];

async function cargarDatos(){
  try{
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0,-2));

    data = json.table.rows.map(r=>{
      const c = (r.c || []).map(x => x ? x.v : "");

      return{
        tipo:c[1] || "",
        doc:c[2] || "",
        nombre:c[3] || "",
        rol:c[4] || "",
        entidad:c[5] || "",
        placa:c[6] || "",
        contacto:c[8] || "",
        emergencia:c[9] || "",
        parentesco:c[11] || ""
      };
    });

  }catch(e){
    alert("Error cargando base");
  }
}

window.onload = cargarDatos;

/* 🔧 PROVEEDOR TAMBIÉN PUEDE SALIDA */
function cambiarVista(){

  const rol = document.getElementById("rolSelect").value;

  document.getElementById("zonaCedula").classList.remove("hidden");
  document.getElementById("zonaIngreso").classList.remove("hidden");

  if(rol === "CONTRATISTA" || rol === "PROVEEDOR"){
    document.getElementById("zonaSalida").classList.remove("hidden");
  } else {
    document.getElementById("zonaSalida").classList.add("hidden");
  }
}

/* BUSCAR USUARIO */
function getUser(){
  const doc = document.getElementById("docInput").value.trim();
  if(!doc) return null;

  return data.find(u => String(u.doc).trim() === doc);
}

/* MENSAJE */
document.addEventListener("input", function(e){

  if(e.target.id !== "docInput") return;

  const user = getUser();
  const mensaje = document.getElementById("mensaje");

  if(!e.target.value){
    mensaje.innerText = "";
    return;
  }

  if(user){
    mensaje.innerText = "Bienvenido nuevamente, " + user.nombre.split(" ")[0] + " 👋";
  } else {
    mensaje.innerText = "Bienvenido a nuestras instalaciones 😊";
  }

});

/* INGRESO */
function irIngreso(){

  const doc = document.getElementById("docInput").value.trim();
  const rol = document.getElementById("rolSelect").value;

  if(!doc || !rol){
    alert("Complete los datos");
    return;
  }

  const user = getUser();

  const url =
    "https://docs.google.com/forms/d/e/1FAIpQLSd0NQ4XvHoMeSLRNJvas_t_7ufz9QxDUHf3erdBoiXqzd-aVQ/formResponse" +
    "?entry.1086354848=" + encodeURIComponent(rol) +
    "&entry.1899230705=" + encodeURIComponent(user ? user.nombre : "") +
    "&entry.2083119061=" + encodeURIComponent(user ? user.tipo : "") +
    "&entry.311902120=" + encodeURIComponent(doc) +
    "&entry.1651701540=" + encodeURIComponent(rol);

  window.location.href = url;
}

/* 🚪 SALIDA (ARREGLADA Y FUNCIONAL 100%) */
function irSalida(){

  const doc = document.getElementById("docInput").value.trim();
  const rol = document.getElementById("rolSelect").value;

  if(!doc){
    alert("Ingrese documento");
    return;
  }

  const user = getUser();

  const url =
    "https://docs.google.com/forms/d/e/1FAIpQLSedPNuvXarpvh2t9ssrBUa3AEPI8ZIu20CTpZa9tGcklEGKwQ/formResponse" +
    "?entry.232043619=" + encodeURIComponent(user ? user.nombre : "") +
    "&entry.861901166=" + encodeURIComponent(doc) +
    "&entry.1077137573=" + encodeURIComponent(user ? user.tipo : "") +
    "&entry.349719305=" + encodeURIComponent(rol);

  // 🔥 IMPORTANTE: redirección directa (esto SÍ guarda en Sheets)
  window.location.href = url;
}

</script>

</body>
</html>
