<!DOCTYPE html>
<html>
<head>
  <title>Control de Acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Inter',sans-serif;
      background:linear-gradient(135deg,#e9eef5,#dfe7f1);
      margin:0;
      text-align:center;
    }

    .header{
      background:white;
      padding:10px 0;
      border-bottom:2px solid #0b3d91;
      box-shadow:0 2px 6px rgba(0,0,0,.05);
    }

    .header img{
      width:55%;
      max-width:200px;
    }

    .container{
      background:white;
      width:90%;
      max-width:380px;
      margin:30px auto;
      padding:25px;
      border-radius:18px;
      box-shadow:0 10px 25px rgba(0,0,0,.08);
    }

    h2{
      margin-bottom:10px;
      color:#0b3d91;
      font-size:24px;
      font-weight:700;
    }

    .mensaje{
      font-size:13px;
      color:#444;
      margin-bottom:15px;
      min-height:20px;
    }

    input,select{
      width:80%;
      padding:12px;
      border-radius:10px;
      border:1px solid #ccc;
      margin-bottom:14px;
      outline:none;
      font-family:'Inter',sans-serif;
    }

    .btn{
      width:100%;
      padding:13px;
      border:none;
      border-radius:12px;
      color:white;
      font-size:15px;
      margin-bottom:12px;
      cursor:pointer;
      font-family:'Inter',sans-serif;
    }

    .ingreso{ background:#0b3d91; }
    .salida{ background:#c62828; }

    .hidden{ display:none; }

    .footer{
      font-size:11px;
      margin-top:20px;
      line-height:1.4;
    }

    .footer .departamento{
      color:#0b3d91;
      font-weight:700;
    }

    .footer .corporacion{
      color:#000;
      font-weight:700;
    }

    /* =========================
       OVERLAY BONITO
    ========================= */

    .overlay{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      z-index:9999;
    }

    .card{
      background:white;
      padding:25px;
      border-radius:18px;
      width:85%;
      max-width:320px;
      box-shadow:0 15px 35px rgba(0,0,0,0.2);
      text-align:center;
      animation:pop .25s ease;
    }

    .card input{
      width:100%;
      margin-top:15px;
      padding:12px;
      border-radius:10px;
      border:1px solid #ccc;
      text-align:center;
    }

    #msgInicio{
      font-size:15px;
      color:#333;
      font-weight:600;
    }

    #bienvenida{
      margin-top:10px;
      font-size:18px;
      font-weight:700;
      color:#0b3d91;
    }

    @keyframes pop{
      from{transform:scale(0.9);opacity:0;}
      to{transform:scale(1);opacity:1;}
    }

  </style>
</head>

<body>

<!-- 🔵 OVERLAY -->
<div id="overlay" class="overlay">

  <div class="card">

    <div id="msgInicio">Registre su ingreso / salida</div>

    <input id="docInput" placeholder="Ingrese documento">

    <div id="bienvenida"></div>

  </div>

</div>

<div class="header">
  <img src="https://i.imgur.com/OB279U8.jpeg">
</div>

<div class="container">

  <h2>Control de Acceso</h2>

  <div class="mensaje" id="mensaje"></div>

  <select id="rolSelect" onchange="cambiarVista()">
    <option value="">Defina su rol</option>
    <option value="VISITANTE">VISITANTE</option>
    <option value="CONTRATISTA">CONTRATISTA</option>
    <option value="PROVEEDOR">PROVEEDOR</option>
  </select>

  <div id="zonaCedula" class="hidden">

    <select id="tipoDocInput">
      <option value="">Tipo de documento</option>
      <option value="Cedula de Ciudadania">Cédula de Ciudadanía</option>
      <option value="Tarjeta de Identidad">Tarjeta de Identidad</option>
      <option value="Cedula de Extranjeria">Cédula de Extranjería</option>
      <option value="Pasaporte">Pasaporte</option>
    </select>

  </div>

  <div id="zonaIngreso" class="hidden">
    <button class="btn ingreso" onclick="irIngreso()">Ingreso</button>
  </div>

  <div id="zonaSalida" class="hidden">
    <button class="btn salida" onclick="irSalida()">Salida</button>
  </div>

  <div class="footer">
    <div class="departamento">
      DEPARTAMENTO DE CONTROL INTERNO DE SEGURIDAD E INFRAESTRUCTURA
    </div>
    <div class="corporacion">
      CORPORACION COLEGIO INTERNACIONAL ALTAMIRA
    </div>
  </div>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";

let data = [];

/* =========================
   CARGA BASE
========================= */

async function cargarDatos(){
  try{
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0,-2));

    data = json.table.rows.map(r=>{
      const c = (r.c || []).map(x => x ? x.v : "");

      return{
        tipo:c[1] || "",
        doc:c[2] || "",
        nombre:c[3] || "",
        rol:c[4] || "",
        entidad:c[5] || "",
        placa:c[6] || "",
        contacto:c[8] || "",
        emergencia:c[9] || "",
        parentesco:c[11] || ""
      };
    });

  }catch(e){
    console.log(e);
  }
}

window.onload = cargarDatos;

/* =========================
   OVERLAY LÓGICA
========================= */

const overlay = document.getElementById("overlay");
const docInput = document.getElementById("docInput");
const msgInicio = document.getElementById("msgInicio");
const bienvenida = document.getElementById("bienvenida");

docInput.addEventListener("input", () => {

  const doc = docInput.value.trim();
  if(doc.length < 4) return;

  const user = getUser();

  msgInicio.style.display = "none";

  bienvenida.innerText =
    user && user.nombre
      ? "Bienvenido " + user.nombre.split(" ")[0] + " 👋"
      : "Bienvenido 👋";

  setTimeout(()=>{
    overlay.style.display = "none";
  },1800);

});

/* =========================
   VISTA
========================= */

function cambiarVista(){

  document.getElementById("zonaCedula").classList.remove("hidden");
  document.getElementById("zonaIngreso").classList.remove("hidden");

  const rol = document.getElementById("rolSelect").value;

  if(rol === "CONTRATISTA" || rol === "PROVEEDOR"){
    document.getElementById("zonaSalida").classList.remove("hidden");
  }else{
    document.getElementById("zonaSalida").classList.add("hidden");
  }
}

/* =========================
   USUARIO
========================= */

function getUser(){

  const doc = docInput.value.trim();
  if(!doc) return null;

  for(let i = data.length - 1; i >= 0; i--){
    if(String(data[i].doc).trim() === doc){
      return data[i];
    }
  }

  return null;
}

/* =========================
   INGRESO
========================= */

function irIngreso(){

  const doc = docInput.value.trim();
  const rol = document.getElementById("rolSelect").value;
  const tipoDoc = document.getElementById("tipoDocInput").value;

  if(!doc || !rol || !tipoDoc){
    alert("Complete todos los campos");
    return;
  }

  const user = getUser();

  const form = "https://docs.google.com/forms/d/e/1FAIpQLSd0NQ4XvHoMeSLRNJvas_t_7ufz9QxDUHf3erdBoiXqzd-aVQ/viewform";

  const url =
    form +
    "?usp=pp_url" +
    "&entry.1086354848=" + encodeURIComponent(rol) +
    "&entry.1899230705=" + encodeURIComponent(user?.nombre || "") +
    "&entry.2083119061=" + encodeURIComponent(tipoDoc) +
    "&entry.311902120=" + encodeURIComponent(doc);

  window.location.href = url;
}

/* =========================
   SALIDA (AUTO)
========================= */

function irSalida(){

  const doc = docInput.value.trim();
  const tipoDoc = document.getElementById("tipoDocInput").value;

  if(!doc || !tipoDoc){
    alert("Complete los campos");
    return;
  }

  const user = getUser();

  if(!user){
    alert("Usuario no encontrado");
    return;
  }

  const form = "https://docs.google.com/forms/d/e/1FAIpQLSedPNuvXarpvh2t9ssrBUa3AEPI8ZIu20CTpZa9tGcklEGKwQ/viewform";

  const url =
    form +
    "?usp=pp_url" +
    "&entry.349719305=" + encodeURIComponent(user.rol) +
    "&entry.232043619=" + encodeURIComponent(user.nombre || "") +
    "&entry.861901166=" + encodeURIComponent(tipoDoc) +
    "&entry.1077137573=" + encodeURIComponent(user.doc || "");

  window.location.href = url;
}

</script>

</body>
</html>
