<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Accesos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f4f6f9;
    }

    .header{
      background:#0b3d91;
      color:white;
      padding:15px;
      text-align:center;
      font-size:20px;
      font-weight:bold;
    }

    .cards{
      display:flex;
      justify-content:center;
      gap:15px;
      padding:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:12px;
      width:180px;
      text-align:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    .card p{
      font-size:28px;
      margin:10px 0 0;
      font-weight:bold;
      color:#0b3d91;
    }

    .container{
      width:95%;
      max-width:1000px;
      margin:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
      margin-top:20px;
    }

    th,td{
      padding:10px;
      border-bottom:1px solid #ddd;
      font-size:13px;
    }

    th{
      background:#0b3d91;
      color:white;
    }

    .alerta{
      background:#fff3cd;
      color:#856404;
      padding:10px;
      margin:10px;
      border-radius:8px;
      text-align:center;
    }
  </style>
</head>

<body>

<div class="header">Dashboard de Accesos</div>

<div id="errorBox" class="alerta" style="display:none;">
  ⚠️ Error cargando datos
</div>

<div class="cards">
  <div class="card">
    <h3>Dentro</h3>
    <p id="dentro">0</p>
  </div>
</div>

<div class="container">

<h3>🟢 Contratistas dentro</h3>
<table>
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Documento</th>
    </tr>
  </thead>
  <tbody id="contratistas"></tbody>
</table>

<h3>📋 Últimos movimientos</h3>
<table>
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Documento</th>
      <th>Rol</th>
      <th>Tipo</th>
      <th>Fecha</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?tqx=out:json";

let registros = [];

async function cargarDatos(){
  try{
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0,-2));

    document.getElementById("errorBox").style.display = "none";

    registros = json.table.rows.map(r => {
      const c = (r.c || []).map(x => x ? x.v : "");

      return {
        tipo: c[1],
        documento: c[2],
        nombre: c[3],
        rol: c[4],
        fecha: formatearFecha(c[0])
      }
    });

    procesar();

  }catch(e){
    document.getElementById("errorBox").style.display = "block";
  }
}

/* FECHA */
function formatearFecha(f){
  if(!f) return "";

  if(typeof f === "string" && f.includes("Date")){
    const p = f.match(/\d+/g);
    return new Date(p[0],p[1],p[2],p[3]||0,p[4]||0).toLocaleString();
  }

  return new Date(f).toLocaleString();
}

/* PROCESAR */
function procesar(){

  const dentroMap = {};

  registros.forEach(r => {
    if(r.tipo === "INGRESO"){
      dentroMap[r.documento] = r;
    }
    if(r.tipo === "SALIDA"){
      delete dentroMap[r.documento];
    }
  });

  const dentro = Object.values(dentroMap);

  document.getElementById("dentro").innerText = dentro.length;

  renderContratistas(dentro);
  renderTabla();
}

/* CONTRATISTAS DENTRO */
function renderContratistas(lista){

  const tbody = document.getElementById("contratistas");
  tbody.innerHTML = "";

  lista
    .filter(p => p.rol === "CONTRATISTA")
    .forEach(p => {
      tbody.innerHTML += `
        <tr>
          <td>${p.nombre}</td>
          <td>${p.documento}</td>
        </tr>
      `;
    });
}

/* ÚLTIMOS MOVIMIENTOS */
function renderTabla(){

  const tbody = document.getElementById("tabla");
  tbody.innerHTML = "";

  registros
    .slice()
    .reverse()
    .slice(0,20)
    .forEach(r => {
      tbody.innerHTML += `
        <tr>
          <td>${r.nombre}</td>
          <td>${r.documento}</td>
          <td>${r.rol}</td>
          <td>${r.tipo}</td>
          <td>${r.fecha}</td>
        </tr>
      `;
    });
}

/* AUTO REFRESH */
setInterval(cargarDatos, 30000);

cargarDatos();

</script>

</body>
</html>
