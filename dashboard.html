<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard Seguridad Altamira</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#eef2f7,#dde6f1);
color:#111;
}

.header{
background:#fff;
padding:18px;
text-align:center;
border-bottom:3px solid #0b3d91;
}

.header img{width:180px;max-width:80%;}

.header h1{
margin-top:10px;
font-size:24px;
color:#0b3d91;
}

.wrap{
width:95%;
max-width:1300px;
margin:auto;
padding:25px 0;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:25px;
}

.card{
background:#fff;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.card h2{
font-size:34px;
color:#0b3d91;
}

.grid{
display:grid;
grid-template-columns:1.3fr .7fr;
gap:18px;
}

.panel{
background:#fff;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#0b3d91;
color:#fff;
padding:12px;
text-align:left;
font-size:13px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
font-size:14px;
}

.lista{
display:flex;
flex-direction:column;
gap:10px;
}

.item{
background:#f8fafc;
padding:12px;
border-radius:12px;
font-size:14px;
}

.badge-in{color:green;font-weight:bold;}
.badge-out{color:red;font-weight:bold;}

@media(max-width:900px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/OB279U8.jpeg">
<h1>Dashboard de Seguridad</h1>
</div>

<div class="wrap">

<div class="cards">
<div class="card"><h2 id="ingresos">0</h2><small>Ingresos Hoy</small></div>
<div class="card"><h2 id="salidas">0</h2><small>Salidas Hoy</small></div>
<div class="card"><h2 id="dentro">0</h2><small>Dentro</small></div>
</div>

<div class="grid">

<div class="panel">
<h3>Últimos Movimientos</h3>
<table>
<thead>
<tr>
<th>Hora</th>
<th>Nombre</th>
<th>Rol</th>
<th>Tipo</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="panel">
<h3>Personas Dentro</h3>

<h4>Contratistas</h4>
<div id="listaContratistas" class="lista"></div>

<h4 style="margin-top:15px;">Proveedores</h4>
<div id="listaProveedores" class="lista"></div>

</div>

</div>
</div>

<script>

/* ======================
CONFIG
====================== */

const URL_INGRESOS="https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";
const URL_SALIDAS="https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=366969943&tqx=out:json";

let lastHash="";

/* ======================
LECTURA SEGURA
====================== */

async function leer(url){
try{
const r=await fetch(url);
const t=await r.text();
const json=JSON.parse(t.substring(47).slice(0,-2));
return json.table.rows.map(r=>(r.c||[]).map(x=>x?x.v:""));
}catch(e){
console.log("error sheet",e);
return [];
}
}

/* ======================
FECHA
====================== */

function esHoy(v){
if(!v) return false;
let d=new Date(v);
if(isNaN(d)) return false;

let h=new Date();
return d.getDate()==h.getDate() &&
d.getMonth()==h.getMonth() &&
d.getFullYear()==h.getFullYear();
}

function hora(v){
let d=new Date(v);
return isNaN(d)?"--":d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

/* ======================
MAIN
====================== */

async function cargar(){

try{

let ingR=await leer(URL_INGRESOS);
let salR=await leer(URL_SALIDAS);

if(!ingR.length) return;

let hash=ingR.length+"-"+salR.length;
if(hash==lastHash)return;
lastHash=hash;

/* INGRESOS HOY */
let ingresos=ingR.filter(f=>esHoy(f[0]));
let salidas=salR.filter(f=>esHoy(f[0]));

/* CARDS */
document.getElementById("ingresos").innerText=ingresos.length;
document.getElementById("salidas").innerText=salidas.length;

/* MOVIMIENTOS */
let mov=[];

ingresos.forEach(f=>{
mov.push({h:f[0],n:f[3],r:f[4],t:"Ingreso"});
});

salidas.forEach(f=>{
mov.push({h:f[0],n:f[3],r:f[4],t:"Salida"});
});

mov.sort((a,b)=>new Date(b.h)-new Date(a.h));
mov=mov.slice(0,10);

document.getElementById("tabla").innerHTML=
mov.map(m=>`
<tr>
<td>${hora(m.h)}</td>
<td>${m.n||"-"}</td>
<td>${m.r||"-"}</td>
<td>${m.t}</td>
</tr>
`).join("");

/* ======================
CONTRATISTAS Y PROVEEDORES
====================== */

let contratistas=new Map();
let proveedores=new Map();

ingresos.forEach(f=>{

let rol=(f[4]||"").toUpperCase();
let nombre=f[3];
let entidad=f[5];

if(rol.includes("CONTRAT")){
contratistas.set(nombre,{nombre,entidad});
}

if(rol.includes("PROVE")){
proveedores.set(nombre,{nombre,entidad});
}

});

/* RENDER CONTRATISTAS */
document.getElementById("listaContratistas").innerHTML=
[...contratistas.values()].map(x=>
`<div class="item"><b>${x.nombre}</b><br>${x.entidad||""}</div>`
).join("") || "<div class='item'>Sin contratistas</div>";

/* RENDER PROVEEDORES */
document.getElementById("listaProveedores").innerHTML=
[...proveedores.values()].map(x=>
`<div class="item"><b>${x.nombre}</b><br>${x.entidad||""}</div>`
).join("") || "<div class='item'>Sin proveedores</div>";

}catch(e){
console.log(e);
}

}

cargar();
setInterval(cargar,5000);

</script>

</body>
</html>
