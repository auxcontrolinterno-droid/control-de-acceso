<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard Seguridad Altamira</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#eef2f7;
color:#111;
}

.header{
background:white;
padding:18px;
text-align:center;
border-bottom:3px solid #0b3d91;
}

.header img{width:180px;}

.header h1{
color:#0b3d91;
margin-top:10px;
font-size:24px;
}

.wrap{
width:95%;
margin:auto;
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:12px;
margin-bottom:20px;
}

.card{
background:white;
padding:18px;
border-radius:12px;
text-align:center;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card h2{
font-size:30px;
color:#0b3d91;
margin:0;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:15px;
}

.panel{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#0b3d91;
color:white;
padding:10px;
text-align:left;
font-size:13px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
font-size:14px;
}

.item{
background:#f7f9fc;
padding:10px;
margin-bottom:8px;
border-radius:10px;
}

.badge-in{color:green;font-weight:bold;}
.badge-out{color:red;font-weight:bold;}

</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/OB279U8.jpeg">
<h1>Dashboard de Seguridad</h1>
</div>

<div class="wrap">

<div class="cards">
<div class="card"><h2 id="ingresos">0</h2><small>Ingresos Hoy</small></div>
<div class="card"><h2 id="salidas">0</h2><small>Salidas Hoy</small></div>
<div class="card"><h2 id="dentro">0</h2><small>Dentro</small></div>
<div class="card"><h2 id="hora">--</h2><small>Hora</small></div>
<div class="card"><h2 id="sync">--</h2><small>Sync</small></div>
<div class="card"><h2 id="estado">🟢</h2><small>Estado</small></div>
</div>

<div class="grid">

<div class="panel">
<h3>Últimos Movimientos</h3>
<table>
<thead>
<tr>
<th>Hora</th>
<th>Nombre</th>
<th>Rol</th>
<th>Tipo</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="panel">
<h3>Contratistas Dentro</h3>
<div id="listaContratistas"></div>
</div>

<div class="panel">
<h3>Proveedores Dentro</h3>
<div id="listaProveedores"></div>
</div>

</div>

</div>

<script>

/* =========================
   URL SHEETS
========================= */

const INGRESOS_URL="https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";
const SALIDAS_URL="https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=366969943&tqx=out:json";

/* =========================
   LECTURA SEGURA (CORREGIDA)
========================= */

async function leer(url){
try{
const res=await fetch(url);
const text=await res.text();

/* 🔥 FIX REAL: Google Sheets response */
const match=text.match(/google\.visualization\.Query\.setResponse\((.*)\);/s);

if(!match) return [];

const json=JSON.parse(match[1]);

return json.table.rows.map(r=>
(r.c||[]).map(c=>c?c.v:"")
);

}catch(e){
console.log("ERROR SHEET",e);
return [];
}
}

/* =========================
   FECHA
========================= */

function hoy(v){
return new Date(v).toDateString()===new Date().toDateString();
}

function hora(v){
return new Date(v).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

/* =========================
   MAIN
========================= */

async function load(){

let ing=await leer(INGRESOS_URL);
let sal=await leer(SALIDAS_URL);

if(!ing.length){
document.getElementById("estado").innerText="🔴 SIN DATOS";
return;
}

/* HOY */
let ingresos=ing.filter(x=>hoy(x[0]));
let salidas=sal.filter(x=>hoy(x[0]));

/* CARDS */
document.getElementById("ingresos").innerText=ingresos.length;
document.getElementById("salidas").innerText=salidas.length;
document.getElementById("sync").innerText=new Date().toLocaleTimeString();

/* MOVIMIENTOS */
let mov=[];

ingresos.forEach(f=>{
mov.push({h:f[0],n:f[3],r:f[4],t:"Ingreso"});
});

salidas.forEach(f=>{
mov.push({h:f[0],n:f[3],r:f[4],t:"Salida"});
});

mov.sort((a,b)=>new Date(b.h)-new Date(a.h));

document.getElementById("tabla").innerHTML=
mov.slice(0,10).map(m=>`
<tr>
<td>${hora(m.h)}</td>
<td>${m.n||"-"}</td>
<td>${m.r||"-"}</td>
<td>${m.t}</td>
</tr>
`).join("");


/* =========================
   CONTRATISTAS
========================= */

let contratistas=new Map();
let proveedores=new Map();

ingresos.forEach(f=>{

let rol=(f[4]||"").toUpperCase();
let nombre=f[3];
let entidad=f[5];

if(rol.includes("CONTRAT")){
contratistas.set(nombre,entidad);
}

if(rol.includes("PROVE")){
proveedores.set(nombre,entidad);
}

});

document.getElementById("listaContratistas").innerHTML=
[...contratistas.entries()].map(x=>
`<div class="item"><b>${x[0]}</b><br>${x[1]}</div>`
).join("")||"Sin contratistas";

document.getElementById("listaProveedores").innerHTML=
[...proveedores.entries()].map(x=>
`<div class="item"><b>${x[0]}</b><br>${x[1]}</div>`
).join("")||"Sin proveedores";

}

function reloj(){
document.getElementById("hora").innerText=
new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

load();
setInterval(load,5000);
setInterval(reloj,1000);

</script>

</body>
</html>
