<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Seguridad Altamira</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#eef2f7;
color:#111;
}

/* HEADER */
.header{
background:white;
padding:20px;
text-align:center;
border-bottom:3px solid #0b3d91;
}

.header img{
width:200px;
}

.header h1{
color:#0b3d91;
margin-top:10px;
font-size:24px;
}

/* CONTENEDOR */
.wrap{
width:95%;
margin:auto;
padding:20px;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
text-align:center;
}

.card h2{
font-size:32px;
color:#0b3d91;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:15px;
}

/* PANEL */
.panel{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.panel h3{
color:#0b3d91;
margin-bottom:10px;
}

/* TABLA */
table{
width:100%;
border-collapse:collapse;
}

th{
background:#0b3d91;
color:white;
padding:10px;
font-size:13px;
text-align:left;
}

td{
padding:10px;
border-bottom:1px solid #eee;
font-size:14px;
}

/* LISTAS */
.item{
background:#f7f9fc;
padding:10px;
margin-bottom:8px;
border-radius:10px;
}

/* BADGES */
.badge-in{color:green;font-weight:bold;}
.badge-out{color:red;font-weight:bold;}

</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/OB279U8.jpeg">
<h1>Dashboard de Seguridad</h1>
</div>

<div class="wrap">

<!-- CARDS -->
<div class="cards">
<div class="card"><h2 id="ingresos">0</h2><small>Ingresos Hoy</small></div>
<div class="card"><h2 id="salidas">0</h2><small>Salidas Hoy</small></div>
<div class="card"><h2 id="dentro">0</h2><small>Dentro</small></div>
<div class="card"><h2 id="estado">🟡</h2><small>Estado</small></div>
<div class="card"><h2 id="hora">--</h2><small>Hora</small></div>
<div class="card"><h2 id="sync">--</h2><small>Sync</small></div>
</div>

<!-- GRID -->
<div class="grid">

<!-- MOVIMIENTOS -->
<div class="panel">
<h3>Últimos Movimientos</h3>
<table>
<thead>
<tr>
<th>Hora</th>
<th>Nombre</th>
<th>Rol</th>
<th>Tipo</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<!-- CONTRATISTAS -->
<div class="panel">
<h3>Contratistas Dentro</h3>
<div id="listaContratistas"></div>
</div>

<!-- PROVEEDORES -->
<div class="panel">
<h3>Proveedores Dentro</h3>
<div id="listaProveedores"></div>
</div>

</div>

</div>

<script>

/* URLs */
const ING="https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";
const SAL="https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=366969943&tqx=out:json";

let last="";

/* leer seguro */
async function leer(url){
try{
let r=await fetch(url);
let t=await r.text();
let j=JSON.parse(t.substring(47).slice(0,-2));
return j.table.rows.map(r=>(r.c||[]).map(x=>x?x.v:""));
}catch(e){
return [];
}
}

/* fecha hoy */
function hoy(v){
return new Date(v).toDateString()===new Date().toDateString();
}

function hora(v){
return new Date(v).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

/* MAIN */
async function load(){

let i=await leer(ING);
let s=await leer(SAL);

if(!i.length) return;

let h=i.length+"-"+s.length;
if(h==last)return;
last=h;

let ing=i.filter(x=>hoy(x[0]));
let sal=s.filter(x=>hoy(x[0]));

/* cards */
document.getElementById("ingresos").innerText=ing.length;
document.getElementById("salidas").innerText=sal.length;
document.getElementById("sync").innerText=new Date().toLocaleTimeString();

/* movimientos */
let mov=[];

ing.forEach(f=>mov.push({h:f[0],n:f[3],r:f[4],t:"Ingreso"}));
sal.forEach(f=>mov.push({h:f[0],n:f[3],r:f[4],t:"Salida"}));

mov.sort((a,b)=>new Date(b.h)-new Date(a.h));

document.getElementById("tabla").innerHTML=
mov.slice(0,10).map(m=>`
<tr>
<td>${hora(m.h)}</td>
<td>${m.n||"-"}</td>
<td>${m.r||"-"}</td>
<td>${m.t}</td>
</tr>`).join("");


/* CONTRATISTAS */
let cont=new Map();

ing.forEach(f=>{
if((f[4]||"").toUpperCase().includes("CONTRATISTA")){
cont.set(f[3],f[5]);
}
});

document.getElementById("listaContratistas").innerHTML=
[...cont.entries()].map(x=>
`<div class="item"><b>${x[0]}</b><br>${x[1]}</div>`
).join("")||"Sin contratistas";


/* PROVEEDORES */
let prov=new Map();

ing.forEach(f=>{
if((f[4]||"").toUpperCase().includes("PROVEEDOR")){
prov.set(f[3],f[5]);
}
});

document.getElementById("listaProveedores").innerHTML=
[...prov.entries()].map(x=>
`<div class="item"><b>${x[0]}</b><br>${x[1]}</div>`
).join("")||"Sin proveedores";

}

function reloj(){
document.getElementById("hora").innerText=
new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

load();
setInterval(load,5000);
setInterval(reloj,1000);

</script>

</body>
</html>
