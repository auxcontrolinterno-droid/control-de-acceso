<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard Seguridad Altamira</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#eef2f7,#dde6f1);
color:#111;
}

/* HEADER */
.header{
background:#fff;
padding:22px;
text-align:center;
border-bottom:3px solid #0b3d91;
}

.header img{width:220px;}

.header h1{
margin-top:10px;
font-size:28px;
color:#0b3d91;
}

/* WRAP PC / TV */
.wrap{
width:98%;
max-width:1600px;
margin:auto;
padding:30px 0;
}

/* CARDS MÁS GRANDES */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
margin-bottom:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
transition:.2s;
}

.card:hover{transform:translateY(-3px);}

.card small{
display:block;
color:#666;
margin-bottom:10px;
font-size:14px;
}

.card h2{
font-size:40px;
color:#0b3d91;
}

/* GRID MÁS ESPACIO */
.grid{
display:grid;
grid-template-columns:1.5fr .8fr;
gap:22px;
}

/* PANEL GRANDE */
.panel{
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.panel h3{
margin-bottom:18px;
color:#0b3d91;
font-size:20px;
}

/* TABLA MÁS LEGIBLE */
table{
width:100%;
border-collapse:collapse;
}

th{
background:#0b3d91;
color:#fff;
padding:14px;
font-size:14px;
text-align:left;
}

td{
padding:13px;
border-bottom:1px solid #eee;
font-size:15px;
}

/* BADGES */
.badge-in{
background:#dcfce7;
color:#15803d;
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:700;
}

.badge-out{
background:#fee2e2;
color:#b91c1c;
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:700;
}

/* LISTA MÁS CLARA */
.lista{
display:flex;
flex-direction:column;
gap:12px;
}

.item{
background:#f8fafc;
padding:16px;
border-radius:14px;
font-size:15px;
transition:.2s;
}

.item:hover{
transform:scale(1.02);
background:#eef5ff;
}

/* RESPONSIVE SOLO AJUSTE */
@media(max-width:900px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/OB279U8.jpeg">
<h1>Dashboard de Seguridad</h1>
</div>

<div class="wrap">

<!-- CARDS -->
<div class="cards">

<div class="card">
<small>Ingresos Hoy</small>
<h2 id="ingresos">0</h2>
</div>

<div class="card">
<small>Salidas Hoy</small>
<h2 id="salidas">0</h2>
</div>

<div class="card">
<small>Contratistas Dentro</small>
<h2 id="dentro">0</h2>
</div>

<div class="card">
<small>Estado Sistema</small>
<h2 id="estado">🟡 Cargando</h2>
</div>

<div class="card">
<small>Hora Actual</small>
<h2 id="hora" style="font-size:22px;">--:--</h2>
</div>

<div class="card">
<small>Última Sync</small>
<h2 id="actualizado" style="font-size:20px;">--</h2>
</div>

</div>

<!-- GRID -->

<div class="grid">

<!-- IZQUIERDA GRANDE -->
<div class="panel">
<h3>Últimos Movimientos</h3>

<table>
<thead>
<tr>
<th>Hora</th>
<th>Nombre</th>
<th>Rol</th>
<th>Movimiento</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<!-- DERECHA DOBLE -->

<div style="display:grid; grid-template-columns:1fr 1fr; gap:22px;">

<div class="panel">
<h3>Contratistas Dentro</h3>
<div class="lista" id="listaDentro"></div>
</div>

<div class="panel">
<h3>Proveedores Dentro</h3>
<div class="lista" id="listaProveedores"></div>
</div>

</div>


<script>

/* =========================
   CONFIG
========================= */

const URL_INGRESOS =
"https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";

const URL_SALIDAS =
"https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=366969943&tqx=out:json";

let lastHash = "";

/* =========================
   LEER SHEET (NO TOCADO)
========================= */

async function leerSheet(url){
const res = await fetch(url);
const txt = await res.text();
const json = JSON.parse(txt.substring(47).slice(0,-2));

return json.table.rows.map(r =>
(r.c || []).map(x => x ? x.v : "")
);
}

/* =========================
   FECHAS
========================= */

function convertirFecha(v){
if(!v) return null;
if(v instanceof Date) return v;

if(typeof v === "number"){
return new Date(Math.round((v - 25569) * 86400 * 1000));
}

if(typeof v === "string"){
const d = new Date(v);
if(!isNaN(d)) return d;
}

if(typeof v==="string" && v.includes("Date(")){
const n=v.match(/\d+/g).map(Number);
return new Date(n[0],n[1],n[2],n[3]||0,n[4]||0,n[5]||0);
}

return null;
}

function esHoy(v){
const f=convertirFecha(v);
if(!f) return false;
const h=new Date();
return f.getDate()===h.getDate() &&
f.getMonth()===h.getMonth() &&
f.getFullYear()===h.getFullYear();
}

function hora(v){
const f=convertirFecha(v);
if(!f) return "--";
return f.toLocaleTimeString([],{
hour:'2-digit',minute:'2-digit'
});
}

/* =========================
   DASHBOARD
========================= */

async function cargarDashboard(){

try{

document.getElementById("estado").innerText="🟢 Online";

let ingresosRaw = await leerSheet(URL_INGRESOS);
let salidasRaw = await leerSheet(URL_SALIDAS);

let hash = ingresosRaw.length + "-" + salidasRaw.length;
if(hash === lastHash) return;
lastHash = hash;

let ingresos = ingresosRaw.filter(f=>esHoy(f[0]));
let salidas = salidasRaw.filter(f=>esHoy(f[0]));

document.getElementById("ingresos").innerText = ingresos.length;
document.getElementById("salidas").innerText = salidas.length;
document.getElementById("actualizado").innerText = new Date().toLocaleTimeString();

ultimosMovimientos(ingresos,salidas);
contratistas(ingresos,salidas);
proveedores(ingresos,salidas);

}
catch(e){
document.getElementById("estado").innerText="🔴 Error";
console.log(e);
}

}

/* =========================
   MOVIMIENTOS
========================= */

function ultimosMovimientos(ingresos,salidas){

let mov=[];

ingresos.forEach(f=>mov.push({h:f[0],n:f[3],r:f[4],t:"Ingreso"}));
salidas.forEach(f=>mov.push({h:f[0],n:f[3],r:f[4],t:"Salida"}));

mov.sort((a,b)=>convertirFecha(b.h)-convertirFecha(a.h));
mov=mov.slice(0,10);

document.getElementById("tabla").innerHTML=
mov.map(m=>`
<tr>
<td>${hora(m.h)}</td>
<td>${m.n||"-"}</td>
<td>${m.r||"-"}</td>
<td>${m.t==="Ingreso"
?'<span class="badge-in">Ingreso</span>'
:'<span class="badge-out">Salida</span>'}</td>
</tr>
`).join("");
}

/* =========================
   CONTRATISTAS
========================= */

function contratistas(ingresos,salidas){

let sal=new Set(salidas.map(x=>String(x[2]).trim()));
let map=new Map();

ingresos.forEach(f=>{
if(String(f[4]).toUpperCase()==="CONTRATISTA"){
let d=String(f[2]).trim();
if(!sal.has(d)){
map.set(d,{n:f[3],e:f[5]});
}
}
});

let activos=[...map.values()];
document.getElementById("dentro").innerText=activos.length;

document.getElementById("listaDentro").innerHTML=
activos.length
?activos.map(x=>`<div class="item"><strong>${x.n}</strong><br>${x.e||"-"}</div>`).join("")
:"<div class='item'>Sin contratistas activos</div>";
}

/* =========================
   PROVEEDORES (CORRECTO)
========================= */

function proveedores(ingresos,salidas){

let sal=new Set(salidas.map(x=>String(x[2]).trim()));
let map=new Map();

ingresos.forEach(f=>{
if(String(f[4]||"").toUpperCase()==="PROVEEDOR"){
let d=String(f[2]).trim();
if(!sal.has(d)){
map.set(d,{n:f[3],e:f[5]||"-"});
}
}
});

let activos=[...map.values()];

document.getElementById("listaProveedores").innerHTML=
activos.length
?activos.map(x=>`<div class="item"><strong>${x.n}</strong><br>${x.e}</div>`).join("")
:"<div class='item'>Sin proveedores activos</div>";
}

/* =========================
   RELOJ
========================= */

function reloj(){
document.getElementById("hora").innerText=
new Date().toLocaleTimeString([],{
hour:'2-digit',minute:'2-digit'
});
}

/* =========================
   INICIO
========================= */

cargarDashboard();
setInterval(cargarDashboard,5000);
setInterval(reloj,1000);

</script>

</body>
</html>
