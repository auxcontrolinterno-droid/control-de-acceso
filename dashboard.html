<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Accesos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: 'Segoe UI', Arial;
      margin:0;
      background:#eef2f7;
      text-align:center;
    }

    .header{
      background:#0b3d91;
      color:white;
      padding:18px;
      font-size:22px;
      font-weight:600;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap:15px;
      padding:20px;
    }

    .card{
      background:white;
      border-radius:14px;
      padding:18px;
      box-shadow:0 6px 15px rgba(0,0,0,0.08);
    }

    .card h4{
      margin:0;
      font-size:13px;
      color:#666;
    }

    .card p{
      margin-top:10px;
      font-size:28px;
      font-weight:bold;
    }

    .ing{ color:#2e7d32; }
    .sal{ color:#c62828; }
    .con{ color:#1565c0; }
    .pro{ color:#ef6c00; }

    .container{
      padding:0 20px 30px;
    }

    .section{
      margin-top:20px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 4px 10px rgba(0,0,0,0.05);
      text-align:center;
    }

    th{
      background:#0b3d91;
      color:white;
      padding:10px;
      font-size:13px;
    }

    td{
      padding:10px;
      font-size:13px;
      border-bottom:1px solid #eee;
    }

    .badge-ing{color:#2e7d32;font-weight:bold;}
    .badge-sal{color:#c62828;font-weight:bold;}

    .alerta{
      display:none;
      background:#fff3cd;
      color:#856404;
      padding:10px;
      margin:10px;
      border-radius:8px;
    }
  </style>
</head>

<body>

<div class="header">Control de Accesos - Hoy</div>

<div id="errorBox" class="alerta">
  ⚠️ Error cargando datos
</div>

<div class="grid">
  <div class="card">
    <h4>Ingresos</h4>
    <p class="ing" id="ingresos">0</p>
  </div>

  <div class="card">
    <h4>Salidas</h4>
    <p class="sal" id="salidas">0</p>
  </div>

  <div class="card">
    <h4>Contratistas dentro</h4>
    <p class="con" id="contratistasCount">0</p>
  </div>

  <div class="card">
    <h4>Proveedores dentro</h4>
    <p class="pro" id="proveedoresCount">0</p>
  </div>
</div>

<div class="container">

<div class="section">
<h3>🟢 Contratistas dentro</h3>
<table>
<thead>
<tr>
<th>Nombre</th>
<th>Documento</th>
<th>Hora ingreso</th>
</tr>
</thead>
<tbody id="tablaContratistas"></tbody>
</table>
</div>

<div class="section">
<h3>📋 Últimos movimientos</h3>
<table>
<thead>
<tr>
<th>Nombre</th>
<th>Documento</th>
<th>Rol</th>
<th>Estado</th>
<th>Hora</th>
</tr>
</thead>
<tbody id="tablaMovimientos"></tbody>
</table>
</div>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?tqx=out:json";

let registros = [];

/* PARSE FECHA */
function parseFecha(f){
  if(!f) return null;

  if(typeof f === "string" && f.includes("Date")){
    const p = f.match(/\d+/g);
    return new Date(p[0],p[1],p[2],p[3]||0,p[4]||0);
  }

  return new Date(f);
}

function soloHora(d){
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function esHoy(f){
  const h = new Date();
  return f.getDate()==h.getDate() &&
         f.getMonth()==h.getMonth() &&
         f.getFullYear()==h.getFullYear();
}

/* CARGAR DATOS */
async function cargarDatos(){
  try{
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0,-2));

    document.getElementById("errorBox").style.display="none";

    registros = json.table.rows.map(r=>{
      const c = (r.c||[]).map(x=>x?x.v:"");

      return {
        fecha: parseFecha(c[0]),
        tipo: c[1],
        documento: c[2],
        nombre: c[3],
        rol: c[4]
      }
    }).filter(r=>r.fecha && esHoy(r.fecha));

    procesar();

  }catch(e){
    document.getElementById("errorBox").style.display="block";
  }
}

/* PROCESAR */
function procesar(){

  let ingresos = registros.filter(r=>r.tipo==="INGRESO").length;
  let salidas = registros.filter(r=>r.tipo==="SALIDA").length;

  document.getElementById("ingresos").innerText = ingresos;
  document.getElementById("salidas").innerText = salidas;

  // 🔥 último movimiento por persona
  const estado = {};
  registros.forEach(r => {
    estado[r.documento] = r;
  });

  const dentro = Object.values(estado)
    .filter(r => r.tipo === "INGRESO");

  const contratistas = dentro.filter(r => 
    r.rol && r.rol.toUpperCase().includes("CONTRATISTA")
  );

  const proveedores = dentro.filter(r => 
    r.rol && r.rol.toUpperCase().includes("PROVEEDOR")
  );

  document.getElementById("contratistasCount").innerText = contratistas.length;
  document.getElementById("proveedoresCount").innerText = proveedores.length;

  renderContratistas(contratistas);
  renderMovimientos();
}

/* CONTRATISTAS DENTRO */
function renderContratistas(lista){
  const t = document.getElementById("tablaContratistas");
  t.innerHTML = "";

  if(lista.length === 0){
    t.innerHTML = "<tr><td colspan='3'>Sin contratistas dentro</td></tr>";
    return;
  }

  lista.forEach(p=>{
    t.innerHTML += `
      <tr>
        <td>${p.nombre}</td>
        <td>${p.documento}</td>
        <td>${soloHora(p.fecha)}</td>
      </tr>
    `;
  });
}

/* ÚLTIMOS MOVIMIENTOS */
function renderMovimientos(){
  const t = document.getElementById("tablaMovimientos");
  t.innerHTML = "";

  registros.slice().reverse().slice(0,20).forEach(r=>{

    const estado = r.tipo==="INGRESO"
      ? '<span class="badge-ing">🟢 Ingresó</span>'
      : '<span class="badge-sal">🔴 Salió</span>';

    t.innerHTML += `
      <tr>
        <td>${r.nombre}</td>
        <td>${r.documento}</td>
        <td>${r.rol}</td>
        <td>${estado}</td>
        <td>${soloHora(r.fecha)}</td>
      </tr>
    `;
  });
}

/* REFRESH AUTOMÁTICO */
setInterval(cargarDatos,30000);
cargarDatos();

</script>

</body>
</html>
