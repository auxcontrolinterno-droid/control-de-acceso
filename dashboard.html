<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard Seguridad Altamira</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#eef2f7,#dde6f1);
color:#111;
}

.header{
background:#fff;
padding:18px;
text-align:center;
border-bottom:3px solid #0b3d91;
box-shadow:0 3px 10px rgba(0,0,0,.05);
}

.header img{
width:180px;
max-width:80%;
}

.header h1{
margin-top:10px;
font-size:24px;
color:#0b3d91;
}

.wrap{
width:95%;
max-width:1300px;
margin:auto;
padding:25px 0;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:25px;
}

.card{
background:#fff;
padding:20px;
border-radius:18px;
box-shadow:0 12px 25px rgba(0,0,0,.08);
}

.card small{
display:block;
font-size:13px;
color:#666;
margin-bottom:8px;
}

.card h2{
font-size:34px;
color:#0b3d91;
}

.grid{
display:grid;
grid-template-columns:1.3fr .7fr;
gap:18px;
}

.panel{
background:#fff;
padding:20px;
border-radius:18px;
box-shadow:0 12px 25px rgba(0,0,0,.08);
}

.panel h3{
margin-bottom:15px;
color:#0b3d91;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#0b3d91;
color:white;
padding:12px;
font-size:13px;
text-align:left;
}

td{
padding:11px;
border-bottom:1px solid #eee;
font-size:14px;
}

.badge-in{
background:#dcfce7;
color:#15803d;
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:700;
}

.badge-out{
background:#fee2e2;
color:#b91c1c;
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:700;
}

.lista{
display:flex;
flex-direction:column;
gap:10px;
}

.item{
background:#f8fafc;
padding:14px;
border-radius:14px;
font-size:14px;
}

.footer{
text-align:center;
margin-top:22px;
font-size:12px;
color:#666;
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/OB279U8.jpeg">
<h1>Dashboard de Seguridad</h1>
</div>

<div class="wrap">

<div class="cards">

<div class="card">
<small>Ingresos Hoy</small>
<h2 id="ingresos">0</h2>
</div>

<div class="card">
<small>Salidas Contratistas</small>
<h2 id="salidas">0</h2>
</div>

<div class="card">
<small>Contratistas Dentro</small>
<h2 id="dentro">0</h2>
</div>

<div class="card">
<small>Hora Actual</small>
<h2 id="hora" style="font-size:24px;">--:--</h2>
</div>

</div>

<div class="grid">

<div class="panel">
<h3>Últimos Movimientos</h3>

<table>
<thead>
<tr>
<th>Hora</th>
<th>Nombre</th>
<th>Rol</th>
<th>Movimiento</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>
</div>

<div class="panel">
<h3>Contratistas Dentro</h3>
<div class="lista" id="listaDentro"></div>
</div>

</div>

<div class="footer">
Actualización automática cada 15 segundos
</div>

</div>

<script>

/* LINKS REALES */

const URL_INGRESOS =
"https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";

const URL_SALIDAS =
"https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=366969943&tqx=out:json";


async function leerSheet(url){

const res = await fetch(url);
const txt = await res.text();
const json = JSON.parse(txt.substring(47).slice(0,-2));

return json.table.rows.map(r =>
(r.c || []).map(x => x ? x.v : "")
);

}

async function cargarDashboard(){

try{

const ingresos = await leerSheet(URL_INGRESOS);
const salidas  = await leerSheet(URL_SALIDAS);

document.getElementById("ingresos").innerText = ingresos.length;
document.getElementById("salidas").innerText  = salidas.length;

ultimosMovimientos(ingresos,salidas);
contratistasDentro(ingresos,salidas);
reloj();

}catch(e){
console.log("Error:",e);
}

}

function ultimosMovimientos(ingresos,salidas){

let movimientos = [];

/* INGRESOS */
ingresos.slice(-8).forEach(f=>{

movimientos.push({
hora:f[0] || "--",
nombre:f[3] || "Sin nombre",
rol:f[4] || "-",
tipo:"Ingreso"
});

});

/* SALIDAS */
salidas.slice(-5).forEach(f=>{

movimientos.push({
hora:f[0] || "--",
nombre:f[3] || "Sin nombre",
rol:f[5] || "CONTRATISTA",
tipo:"Salida"
});

});

movimientos.reverse();

let html = "";

movimientos.forEach(m=>{

html += `
<tr>
<td>${m.hora}</td>
<td>${m.nombre}</td>
<td>${m.rol}</td>
<td>
${m.tipo=="Ingreso"
? '<span class="badge-in">Ingreso</span>'
: '<span class="badge-out">Salida</span>'}
</td>
</tr>
`;

});

document.getElementById("tabla").innerHTML = html;

}

function contratistasDentro(ingresos,salidas){

let docsSalida = salidas.map(x => String(x[2]).trim());

let activos = [];

ingresos.forEach(f=>{

const rol = String(f[4]).toUpperCase();
const doc = String(f[2]).trim();

if(rol=="CONTRATISTA"){

if(!docsSalida.includes(doc)){

activos.push({
nombre:f[3],
empresa:f[5] || "-"
});

}

}

});

document.getElementById("dentro").innerText = activos.length;

let html = "";

activos.forEach(x=>{

html += `
<div class="item">
<strong>${x.nombre}</strong><br>
${x.empresa}
</div>
`;

});

document.getElementById("listaDentro").innerHTML =
html || "<div class='item'>Sin contratistas activos</div>";

}

function reloj(){

const ahora = new Date();

document.getElementById("hora").innerText =
ahora.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
});

}

cargarDashboard();
setInterval(cargarDashboard,15000);

</script>

</body>
</html>
