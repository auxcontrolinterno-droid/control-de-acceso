<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard Seguridad Altamira</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#eef2f7,#dde6f1);
color:#111;
}

/* HEADER */
.header{
background:#fff;
padding:18px;
text-align:center;
border-bottom:3px solid #0b3d91;
}

.header img{width:180px;max-width:80%;}

.header h1{
margin-top:10px;
font-size:24px;
color:#0b3d91;
}

/* WRAP */
.wrap{
width:95%;
max-width:1300px;
margin:auto;
padding:25px 0;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:25px;
}

.card{
background:#fff;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
}

.card small{
display:block;
color:#666;
margin-bottom:8px;
font-size:13px;
}

.card h2{
font-size:34px;
color:#0b3d91;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1.3fr .7fr;
gap:18px;
}

.panel{
background:#fff;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.panel h3{
margin-bottom:15px;
color:#0b3d91;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th{
background:#0b3d91;
color:#fff;
padding:12px;
font-size:13px;
text-align:left;
}

td{
padding:11px;
border-bottom:1px solid #eee;
font-size:14px;
}

.badge-in{
background:#dcfce7;
color:#15803d;
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:700;
}

.badge-out{
background:#fee2e2;
color:#b91c1c;
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:700;
}

/* LISTA */
.lista{
display:flex;
flex-direction:column;
gap:10px;
}

.item{
background:#f8fafc;
padding:14px;
border-radius:14px;
font-size:14px;
transition:.2s;
}

.item:hover{
transform:scale(1.02);
background:#eef5ff;
}

/* FOOTER */
.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#666;
}

/* RESPONSIVE */
@media(max-width:900px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/OB279U8.jpeg">
<h1>Dashboard de Seguridad</h1>
</div>

<div class="wrap">

<!-- CARDS -->
<div class="cards">

<div class="card">
<small>Ingresos Hoy</small>
<h2 id="ingresos">0</h2>
</div>

<div class="card">
<small>Salidas Hoy</small>
<h2 id="salidas">0</h2>
</div>

<div class="card">
<small>Contratistas Dentro</small>
<h2 id="dentro">0</h2>
</div>

<div class="card">
<small>Estado Sistema</small>
<h2 id="estado">🟡 Cargando</h2>
</div>

<div class="card">
<small>Hora Actual</small>
<h2 id="hora" style="font-size:20px;">--:--</h2>
</div>

<div class="card">
<small>Última Sync</small>
<h2 id="actualizado" style="font-size:18px;">--</h2>
</div>

</div>

<!-- GRID -->
<div class="grid">

<div class="panel">
<h3>Últimos Movimientos</h3>

<table>
<thead>
<tr>
<th>Hora</th>
<th>Nombre</th>
<th>Rol</th>
<th>Movimiento</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="panel">
<h3>Contratistas Dentro</h3>
<div class="lista" id="listaDentro"></div>
</div>

</div>

</div>

<script>

/* =========================
   CONFIG
========================= */

const URL_INGRESOS =
"https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";

const URL_SALIDAS =
"https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=366969943&tqx=out:json";

/* =========================
   CACHE (evita renders inútiles)
========================= */

let lastHash = "";

/* =========================
   API SHEETS
========================= */

async function leerSheet(url){
const res = await fetch(url);
const txt = await res.text();
const json = JSON.parse(txt.substring(47).slice(0,-2));

return json.table.rows.map(r =>
(r.c || []).map(x => x ? x.v : "")
);
}

/* =========================
   FECHAS ROBUSTAS
========================= */

function convertirFecha(v){
if(!v) return null;

if(v instanceof Date) return v;

if(typeof v === "number"){
return new Date(Math.round((v - 25569) * 86400 * 1000));
}

if(typeof v === "string"){
const d = new Date(v);
if(!isNaN(d)) return d;
}

if(typeof v==="string" && v.includes("Date(")){
const n=v.match(/\d+/g).map(Number);
return new Date(n[0],n[1],n[2],n[3]||0,n[4]||0,n[5]||0);
}

return null;
}

function esHoy(v){
const f=convertirFecha(v);
if(!f) return false;

const h=new Date();
return f.getDate()===h.getDate() &&
f.getMonth()===h.getMonth() &&
f.getFullYear()===h.getFullYear();
}

function hora(v){
const f=convertirFecha(v);
if(!f) return "--";

return f.toLocaleTimeString([],{
hour:'2-digit',minute:'2-digit'
});
}

/* =========================
   DASHBOARD MAIN
========================= */

async function cargarDashboard(){

try{

document.getElementById("estado").innerText="🟢 Online";

let ingresosRaw = await leerSheet(URL_INGRESOS);
let salidasRaw = await leerSheet(URL_SALIDAS);

/* HASH SIMPLE (evita re-render innecesario) */
let hash = ingresosRaw.length + "-" + salidasRaw.length;

if(hash === lastHash){
return;
}
lastHash = hash;

/* FILTRO HOY */
let ingresos = ingresosRaw.filter(f=>esHoy(f[0]));
let salidas = salidasRaw.filter(f=>esHoy(f[0]));

/* CARDS */
document.getElementById("ingresos").innerText = ingresos.length;
document.getElementById("salidas").innerText = salidas.length;

document.getElementById("actualizado").innerText =
new Date().toLocaleTimeString();

/* RENDER */
ultimosMovimientos(ingresos,salidas);
contratistas(ingresos,salidas);

}catch(e){
document.getElementById("estado").innerText="🔴 Error";
console.log(e);
}

}

/* =========================
   MOVIMIENTOS
========================= */

function ultimosMovimientos(ingresos,salidas){

let mov=[];

ingresos.forEach(f=>{
mov.push({h:f[0],n:f[3],r:f[4],t:"Ingreso"});
});

salidas.forEach(f=>{
mov.push({h:f[0],n:f[3],r:f[4],t:"Salida"});
});

mov.sort((a,b)=>convertirFecha(b.h)-convertirFecha(a.h));
mov=mov.slice(0,10);

document.getElementById("tabla").innerHTML=
mov.map(m=>`
<tr>
<td>${hora(m.h)}</td>
<td>${m.n||"-"}</td>
<td>${m.r||"-"}</td>
<td>${m.t==="Ingreso"
?'<span class="badge-in">Ingreso</span>'
:'<span class="badge-out">Salida</span>'}</td>
</tr>
`).join("");
}

/* =========================
   CONTRATISTAS
========================= */

function contratistas(ingresos,salidas){

let sal=new Set(salidas.map(x=>String(x[2]).trim()));
let map=new Map();

ingresos.forEach(f=>{
if(String(f[4]).toUpperCase()==="CONTRATISTA"){
let d=String(f[2]).trim();
if(!sal.has(d)){
map.set(d,{n:f[3],e:f[5]});
}
}
});

let activos=[...map.values()];

document.getElementById("dentro").innerText=activos.length;

document.getElementById("listaDentro").innerHTML=
activos.length
?activos.map(x=>`
<div class="item">
<strong>${x.n}</strong><br>${x.e||"-"}
</div>`).join("")
:"<div class='item'>Sin contratistas activos</div>";
}

/* =========================
   RELOJ LOCAL
========================= */

function reloj(){
document.getElementById("hora").innerText=
new Date().toLocaleTimeString([],{
hour:'2-digit',minute:'2-digit'
});
}

/* =========================
   INICIO
========================= */

cargarDashboard();

/* 🔥 optimizado */
setInterval(cargarDashboard, 5000); // datos
setInterval(reloj, 1000);           // reloj

</script>

</body>
</html>
