<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard Seguridad Altamira</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#eef2f7,#dde6f1);
color:#111;
}

/* HEADER */
.header{
background:#fff;
padding:18px;
text-align:center;
border-bottom:3px solid #0b3d91;
}

.header img{width:180px;max-width:80%;}

.header h1{
margin-top:10px;
font-size:24px;
color:#0b3d91;
}

/* WRAP */
.wrap{
width:95%;
max-width:1300px;
margin:auto;
padding:25px 0;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:25px;
}

.card{
background:#fff;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.card small{
display:block;
color:#666;
margin-bottom:8px;
font-size:13px;
}

.card h2{
font-size:34px;
color:#0b3d91;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1.3fr .7fr;
gap:18px;
}

.panel{
background:#fff;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.panel h3{
margin-bottom:15px;
color:#0b3d91;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th{
background:#0b3d91;
color:#fff;
padding:12px;
font-size:13px;
text-align:left;
}

td{
padding:11px;
border-bottom:1px solid #eee;
font-size:14px;
}

.badge-in{
background:#dcfce7;
color:#15803d;
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:700;
}

.badge-out{
background:#fee2e2;
color:#b91c1c;
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:700;
}

/* LISTA */
.lista{
display:flex;
flex-direction:column;
gap:10px;
}

.item{
background:#f8fafc;
padding:14px;
border-radius:14px;
font-size:14px;
}

/* FOOTER */
.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#666;
}

@media(max-width:900px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/OB279U8.jpeg">
<h1>Dashboard de Seguridad</h1>
</div>

<div class="wrap">

<!-- CARDS -->
<div class="cards">

<div class="card">
<small>Ingresos Hoy</small>
<h2 id="ingresos">0</h2>
</div>

<div class="card">
<small>Salidas Hoy</small>
<h2 id="salidas">0</h2>
</div>

<div class="card">
<small>Contratistas Dentro</small>
<h2 id="dentro">0</h2>
</div>

<!-- 🔥 NUEVO -->
<div class="card">
<small>Proveedores Dentro</small>
<h2 id="proveedores">0</h2>
</div>

<div class="card">
<small>Estado Sistema</small>
<h2 id="estado">🟡 Cargando</h2>
</div>

<div class="card">
<small>Hora Actual</small>
<h2 id="hora" style="font-size:20px;">--:--</h2>
</div>

<div class="card">
<small>Última Sync</small>
<h2 id="actualizado" style="font-size:18px;">--</h2>
</div>

</div>

<!-- GRID -->
<div class="grid">

<div class="panel">
<h3>Últimos Movimientos</h3>

<table>
<thead>
<tr>
<th>Hora</th>
<th>Nombre</th>
<th>Rol</th>
<th>Movimiento</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="panel">
<h3>Personas Dentro</h3>
<div class="lista" id="listaDentro"></div>
</div>

</div>

</div>

<script>

const URL_INGRESOS =
"https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";

const URL_SALIDAS =
"https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=366969943&tqx=out:json";

let lastHash="";

async function leerSheet(url){
const res=await fetch(url);
const txt=await res.text();
const json=JSON.parse(txt.substring(47).slice(0,-2));
return json.table.rows.map(r=>(r.c||[]).map(x=>x?x.v:""));
}

function convertirFecha(v){
if(!v) return null;
if(v instanceof Date) return v;
if(typeof v==="number") return new Date(Math.round((v-25569)*86400*1000));
return new Date(v);
}

function esHoy(v){
const f=convertirFecha(v);
if(!f) return false;
const h=new Date();
return f.toDateString()===h.toDateString();
}

function hora(v){
const f=convertirFecha(v);
return f?f.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):"--";
}

async function cargarDashboard(){

try{

document.getElementById("estado").innerText="🟢 Online";

let ingresosRaw=await leerSheet(URL_INGRESOS);
let salidasRaw=await leerSheet(URL_SALIDAS);

let hash=ingresosRaw.length+"-"+salidasRaw.length;
if(hash===lastHash) return;
lastHash=hash;

let ingresos=ingresosRaw.filter(f=>esHoy(f[0]));
let salidas=salidasRaw.filter(f=>esHoy(f[0]));

document.getElementById("ingresos").innerText=ingresos.length;
document.getElementById("salidas").innerText=salidas.length;

ultimosMovimientos(ingresos,salidas);
personasDentro(ingresos,salidas);

document.getElementById("actualizado").innerText=
new Date().toLocaleTimeString();

}catch(e){
document.getElementById("estado").innerText="🔴 Error";
console.log(e);
}

}

function ultimosMovimientos(ingresos,salidas){

let mov=[];

ingresos.forEach(f=>{
mov.push({h:f[0],n:f[3],r:f[4],t:"Ingreso"});
});

salidas.forEach(f=>{
mov.push({h:f[0],n:f[3],r:f[5],t:"Salida"});
});

mov.sort((a,b)=>convertirFecha(b.h)-convertirFecha(a.h));
mov=mov.slice(0,10);

document.getElementById("tabla").innerHTML=
mov.map(m=>`
<tr>
<td>${hora(m.h)}</td>
<td>${m.n||"-"}</td>
<td>${m.r||"-"}</td>
<td>${m.t==="Ingreso"
?'<span class="badge-in">Ingreso</span>'
:'<span class="badge-out">Salida</span>'}</td>
</tr>
`).join("");
}

/* 🔥 NUEVO: dentro + duplicados */
function personasDentro(ingresos,salidas){

let salidaSet=new Set(salidas.map(x=>String(x[2]).trim()));

let map=new Map();

ingresos.forEach(f=>{

let rol=String(f[4]).toUpperCase();
let doc=String(f[2]).trim();

if(!salidaSet.has(doc)){

map.set(doc,{
n:f[3],
r:rol
});

}

});

let lista=[...map.values()];

let contr=lista.filter(x=>x.r==="CONTRATISTA");
let prov=lista.filter(x=>x.r==="PROVEEDOR");

document.getElementById("dentro").innerText=contr.length;
document.getElementById("proveedores").innerText=prov.length;

document.getElementById("listaDentro").innerHTML=
lista.map(x=>`
<div class="item">
<strong>${x.n}</strong><br>${x.r}
</div>`).join("");

}

setInterval(cargarDashboard,5000);
cargarDashboard();

</script>

</body>
</html>
