<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Accesos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f4f6f9;
    }

    .header{
      background:#0b3d91;
      color:white;
      padding:15px;
      text-align:center;
      font-size:20px;
      font-weight:bold;
    }

    .cards{
      display:flex;
      justify-content:center;
      padding:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:12px;
      width:200px;
      text-align:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    .card p{
      font-size:28px;
      margin:10px 0 0;
      font-weight:bold;
      color:#0b3d91;
    }

    .container{
      width:95%;
      max-width:1000px;
      margin:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
      margin-top:20px;
    }

    th,td{
      padding:10px;
      border-bottom:1px solid #ddd;
      font-size:13px;
      text-align:left;
    }

    th{
      background:#0b3d91;
      color:white;
    }

    .ingreso{ color:green; font-weight:bold; }
    .salida{ color:red; font-weight:bold; }

    .alerta{
      background:#fff3cd;
      color:#856404;
      padding:10px;
      margin:10px;
      border-radius:8px;
      text-align:center;
      display:none;
    }
  </style>
</head>

<body>

<div class="header">Dashboard de Accesos (Hoy)</div>

<div id="errorBox" class="alerta">
  ⚠️ Error cargando datos
</div>

<div class="cards">
  <div class="card">
    <h3>Personas dentro</h3>
    <p id="dentro">0</p>
  </div>
</div>

<div class="container">

<h3>🟢 Contratistas dentro</h3>
<table>
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Documento</th>
      <th>Hora ingreso</th>
    </tr>
  </thead>
  <tbody id="contratistas"></tbody>
</table>

<h3>📋 Últimos movimientos</h3>
<table>
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Documento</th>
      <th>Rol</th>
      <th>Estado</th>
      <th>Hora</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?tqx=out:json";

let registros = [];

/* FORMATEAR FECHA */
function parseFecha(f){
  if(!f) return null;

  if(typeof f === "string" && f.includes("Date")){
    const p = f.match(/\d+/g);
    return new Date(p[0],p[1],p[2],p[3]||0,p[4]||0);
  }

  return new Date(f);
}

function soloHora(date){
  return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function esHoy(fecha){
  const hoy = new Date();
  return fecha.getDate() === hoy.getDate() &&
         fecha.getMonth() === hoy.getMonth() &&
         fecha.getFullYear() === hoy.getFullYear();
}

/* CARGAR */
async function cargarDatos(){
  try{
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0,-2));

    document.getElementById("errorBox").style.display = "none";

    registros = json.table.rows.map(r => {
      const c = (r.c || []).map(x => x ? x.v : "");
      const fechaObj = parseFecha(c[0]);

      return {
        tipo: c[1],
        documento: c[2],
        nombre: c[3],
        rol: c[4],
        fecha: fechaObj
      }
    })
    .filter(r => r.fecha && esHoy(r.fecha)); // 👈 SOLO HOY

    procesar();

  }catch(e){
    document.getElementById("errorBox").style.display = "block";
  }
}

/* PROCESAR */
function procesar(){

  const estadoFinal = {};

  registros.forEach(r => {
    estadoFinal[r.documento] = r;
  });

  const dentro = Object.values(estadoFinal)
    .filter(r => r.tipo === "INGRESO");

  document.getElementById("dentro").innerText = dentro.length;

  renderContratistas(dentro);
  renderTabla();
}

/* CONTRATISTAS */
function renderContratistas(lista){

  const tbody = document.getElementById("contratistas");
  tbody.innerHTML = "";

  lista
    .filter(p => p.rol === "CONTRATISTA")
    .forEach(p => {
      tbody.innerHTML += `
        <tr>
          <td>${p.nombre}</td>
          <td>${p.documento}</td>
          <td>${soloHora(p.fecha)}</td>
        </tr>
      `;
    });
}

/* TABLA */
function renderTabla(){

  const tbody = document.getElementById("tabla");
  tbody.innerHTML = "";

  registros
    .slice()
    .reverse()
    .slice(0,20)
    .forEach(r => {

      const estado = r.tipo === "INGRESO"
        ? '<span class="ingreso">🟢 Ingresó</span>'
        : '<span class="salida">🔴 Salió</span>';

      tbody.innerHTML += `
        <tr>
          <td>${r.nombre}</td>
          <td>${r.documento}</td>
          <td>${r.rol}</td>
          <td>${estado}</td>
          <td>${soloHora(r.fecha)}</td>
        </tr>
      `;
    });
}

/* REFRESH */
setInterval(cargarDatos, 30000);

cargarDatos();

</script>

</body>
</html>
