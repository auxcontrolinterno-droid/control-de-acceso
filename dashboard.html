<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Seguridad Altamira</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:Inter;
background:linear-gradient(135deg,#eef2f7,#dde6f1);
margin:0;
color:#111;
}

.header{
background:#fff;
padding:18px;
text-align:center;
border-bottom:3px solid #0b3d91;
}

.header img{width:180px;}

.wrap{
width:98%;
max-width:1600px;
margin:auto;
padding:20px;
}

/* MÁS ESPACIO PC */
.cards{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:12px;
margin-bottom:20px;
}

.card{
background:#fff;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h2{color:#0b3d91;}

.grid{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:15px;
}

.panel{
background:#fff;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
min-height:300px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#0b3d91;
color:#fff;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

.item{
padding:10px;
border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/OB279U8.jpeg">
<h2>Dashboard Seguridad</h2>
</div>

<div class="wrap">

<!-- CARDS -->
<div class="cards">
<div class="card"><small>Ingresos</small><h2 id="ingresos">0</h2></div>
<div class="card"><small>Salidas</small><h2 id="salidas">0</h2></div>
<div class="card"><small>Contratistas</small><h2 id="dentro">0</h2></div>
<div class="card"><small>Proveedores</small><h2 id="proveedores">0</h2></div>
</div>

<!-- GRID -->
<div class="grid">

<div class="panel">
<h3>Últimos movimientos</h3>
<table>
<thead>
<tr>
<th>Hora</th>
<th>Nombre</th>
<th>Rol</th>
<th>Movimiento</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="panel">
<h3>Contratistas dentro</h3>
<div id="listaDentro"></div>
</div>

<div class="panel">
<h3>Proveedores dentro</h3>
<div id="listaProveedores"></div>
</div>

</div>

</div>

<script>

const URL =
"https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";

let data=[];

async function cargar(){

const r = await fetch(URL);
const t = await r.text();
const j = JSON.parse(t.substring(47).slice(0,-2));

data = j.table.rows.map(r=>{
const c = r.c || [];
return {
time:c[0]?.v,
doc:c[2]?.v,
nombre:c[3]?.v,
rol:c[4]?.v,
entidad:c[5]?.v
};
});

render();
}

function hoy(t){
return new Date(t).toDateString() === new Date().toDateString();
}

function hora(t){
return new Date(t).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function render(){

let hoyData = data.filter(x=>hoy(x.time));

/* INGRESOS */
document.getElementById("ingresos").innerText = hoyData.length;

/* SALIDAS (solo si en rol dice salida) */
let salidas = hoyData.filter(x=>(x.rol||"").toLowerCase().includes("salida"));
document.getElementById("salidas").innerText = salidas.length;

/* CONTRATISTAS */
let contratistas = hoyData.filter(x=>(x.rol||"").toUpperCase().includes("CONTRATISTA"));

document.getElementById("dentro").innerText = contratistas.length;

document.getElementById("listaDentro").innerHTML =
contratistas.map(x=>`
<div class="item"><b>${x.nombre}</b><br>${x.entidad||""}</div>
`).join("");

/* PROVEEDORES */
let proveedores = hoyData.filter(x=>(x.rol||"").toUpperCase().includes("PROVEEDOR"));

document.getElementById("proveedores").innerText = proveedores.length;

document.getElementById("listaProveedores").innerHTML =
proveedores.map(x=>`
<div class="item"><b>${x.nombre}</b><br>${x.entidad||""}</div>
`).join("");

/* MOVIMIENTOS */
document.getElementById("tabla").innerHTML =
hoyData.slice(-10).reverse().map(x=>`
<tr>
<td>${hora(x.time)}</td>
<td>${x.nombre}</td>
<td>${x.rol}</td>
<td>${(x.rol||"").toLowerCase().includes("salida") ? "Salida" : "Ingreso"}</td>
</tr>
`).join("");
}

cargar();
setInterval(cargar,5000);

</script>

</body>
</html>
