<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard Seguridad Altamira</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#eef2f7,#dde6f1);
color:#111;
}

/* SOLO PC / TV (más ancho estable) */
.wrap{
width:98%;
max-width:1900px;
margin:auto;
padding:15px;
}

/* HEADER */
.header{
background:#fff;
padding:18px;
text-align:center;
border-bottom:3px solid #0b3d91;
}

.header img{width:180px;}
.header h1{margin-top:10px;color:#0b3d91;}

/* CARDS GRANDES */
.cards{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:12px;
margin-bottom:20px;
}

.card{
background:#fff;
padding:16px;
border-radius:14px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,.08);
}

.card h2{
font-size:30px;
color:#0b3d91;
}

/* GRID PC */
.grid{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:14px;
}

/* PANEL */
.panel{
background:#fff;
padding:15px;
border-radius:14px;
box-shadow:0 6px 15px rgba(0,0,0,.08);
}

.panel h3{
margin-bottom:10px;
color:#0b3d91;
}

/* TABLA */
table{
width:100%;
border-collapse:collapse;
}

th{
background:#0b3d91;
color:#fff;
padding:10px;
text-align:left;
}

td{
padding:10px;
border-bottom:1px solid #eee;
font-size:14px;
}

/* LISTAS */
.lista{
display:flex;
flex-direction:column;
gap:8px;
}

.item{
background:#f5f7fb;
padding:10px;
border-radius:10px;
}

/* RESPONSIVE SOLO AJUSTE */
@media(max-width:1200px){
.cards{grid-template-columns:repeat(3,1fr);}
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/OB279U8.jpeg">
<h1>Dashboard de Seguridad</h1>
</div>

<div class="wrap">

<!-- CARDS -->
<div class="cards">
<div class="card"><small>Ingresos</small><h2 id="ingresos">0</h2></div>
<div class="card"><small>Salidas</small><h2 id="salidas">0</h2></div>
<div class="card"><small>Contratistas</small><h2 id="dentro">0</h2></div>
<div class="card"><small>Estado</small><h2 id="estado">🟡</h2></div>
<div class="card"><small>Hora</small><h2 id="hora">--</h2></div>
<div class="card"><small>Sync</small><h2 id="actualizado">--</h2></div>
</div>

<!-- GRID -->
<div class="grid">

<div class="panel">
<h3>Últimos Movimientos</h3>
<table>
<thead>
<tr>
<th>Hora</th>
<th>Nombre</th>
<th>Rol</th>
<th>Estado</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="panel">
<h3>Contratistas Dentro</h3>
<div id="listaDentro" class="lista"></div>
</div>

<div class="panel">
<h3>Proveedores Dentro</h3>
<div id="listaProveedores" class="lista"></div>
</div>

</div>
</div>

<script>

/* 🔥 NO SE TOCA TU CONEXIÓN */
const URL_INGRESOS="https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";
const URL_SALIDAS="https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=366969943&tqx=out:json";

let lastHash="";

/* 🔥 TU FUNCIÓN ORIGINAL SIN TOCAR */
async function leerSheet(url){
const r=await fetch(url);
const t=await r.text();
const j=JSON.parse(t.substring(47).slice(0,-2));
return j.table.rows.map(r=>(r.c||[]).map(x=>x?x.v:""));
}

function hora(v){
let d=new Date(v);
return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function esHoy(v){
let d=new Date(v);
let h=new Date();
return d.getDate()==h.getDate() && d.getMonth()==h.getMonth() && d.getFullYear()==h.getFullYear();
}

/* MAIN */
async function cargar(){

try{

let ing=await leerSheet(URL_INGRESOS);
let sal=await leerSheet(URL_SALIDAS);

ing=ing.filter(x=>esHoy(x[0]));
sal=sal.filter(x=>esHoy(x[0]));

document.getElementById("ingresos").innerText=ing.length;
document.getElementById("salidas").innerText=sal.length;
document.getElementById("actualizado").innerText=new Date().toLocaleTimeString();

/* MOVIMIENTOS */
let mov=[];
ing.forEach(f=>mov.push({h:f[0],n:f[3],r:f[4],t:"Ingreso"}));
sal.forEach(f=>mov.push({h:f[0],n:f[3],r:f[4],t:"Salida"}));

mov.sort((a,b)=>new Date(b.h)-new Date(a.h));
mov=mov.slice(0,10);

document.getElementById("tabla").innerHTML=
mov.map(m=>`
<tr>
<td>${hora(m.h)}</td>
<td>${m.n||"-"}</td>
<td>${m.r||"-"}</td>
<td>${m.t}</td>
</tr>`).join("");

/* CONTRATISTAS */
let cont=new Map();
let prov=new Map();

ing.forEach(f=>{
let rol=(f[4]||"").toUpperCase();

if(rol==="CONTRATISTA") cont.set(f[3],f[5]);
if(rol==="PROVEEDOR") prov.set(f[3],f[5]);
});

document.getElementById("dentro").innerText=cont.size;

document.getElementById("listaDentro").innerHTML=
[...cont.entries()].map(x=>
`<div class="item"><b>${x[0]}</b><br>${x[1]}</div>`
).join("");

document.getElementById("listaProveedores").innerHTML=
[...prov.entries()].map(x=>
`<div class="item"><b>${x[0]}</b><br>${x[1]}</div>`
).join("");

document.getElementById("estado").innerText="🟢 OK";

}catch(e){
console.log(e);
document.getElementById("estado").innerText="🔴 Error";
}
}

setInterval(cargar,5000);
cargar();

</script>

</body>
</html>
