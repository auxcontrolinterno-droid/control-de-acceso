<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#eef2f7,#dde6f1);
color:#111;
}

/* HEADER MÁS GRANDE (TV) */
.header{
background:#fff;
padding:25px;
text-align:center;
border-bottom:4px solid #0b3d91;
}

.header img{
width:260px;
max-width:90%;
}

.header h1{
margin-top:10px;
font-size:28px;
color:#0b3d91;
}

/* CONTENEDOR TIPO CENTRO DE CONTROL */
.wrap{
width:98%;
max-width:1800px;
margin:auto;
padding:30px 10px;
}

/* CARDS TIPO TABLERO TV */
.cards{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:15px;
margin-bottom:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
text-align:center;
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
}

.card small{
font-size:14px;
color:#666;
}

.card h2{
font-size:42px;
color:#0b3d91;
margin-top:5px;
}

/* GRID MÁS ESPACIO */
.grid{
display:grid;
grid-template-columns:2.2fr 1fr 1fr;
gap:20px;
}

/* PANELES GRANDES */
.panel{
background:#fff;
padding:22px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
min-height:520px;
}

.panel h3{
margin-bottom:15px;
color:#0b3d91;
font-size:20px;
}

/* TABLA MÁS LEGIBLE (TV) */
table{
width:100%;
border-collapse:collapse;
font-size:15px;
}

th{
background:#0b3d91;
color:#fff;
padding:14px;
font-size:14px;
}

td{
padding:12px;
border-bottom:1px solid #eee;
font-size:15px;
}

/* LISTAS MÁS VISIBLES */
.item{
background:#f8fafc;
padding:14px;
border-radius:12px;
margin-bottom:10px;
font-size:15px;
transition:.2s;
}

.item:hover{
transform:scale(1.02);
background:#eef5ff;
}

/* FOOTER */
.footer{
text-align:center;
margin-top:25px;
font-size:13px;
color:#666;
}

/* RESPONSIVE SOLO ORDEN (NO MOBILE FIRST) */
@media(max-width:1200px){
.cards{grid-template-columns:repeat(3,1fr);}
.grid{grid-template-columns:1fr;}
}

@media(max-width:700px){
.cards{grid-template-columns:repeat(2,1fr);}
}
</style>
