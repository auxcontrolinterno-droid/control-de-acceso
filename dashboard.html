<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Accesos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f4f6f9;
    }

    .header{
      background:#0b3d91;
      color:white;
      padding:15px;
      text-align:center;
      font-size:20px;
      font-weight:bold;
    }

    .cards{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:15px;
      padding:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:12px;
      width:180px;
      text-align:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    .card h3{
      margin:0;
      font-size:14px;
      color:#555;
    }

    .card p{
      font-size:28px;
      margin:10px 0 0;
      font-weight:bold;
      color:#0b3d91;
    }

    .container{
      width:95%;
      max-width:1000px;
      margin:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
      margin-top:20px;
    }

    th,td{
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:left;
      font-size:13px;
    }

    th{
      background:#0b3d91;
      color:white;
    }

    select{
      padding:10px;
      margin:20px;
      border-radius:8px;
    }
  </style>
</head>

<body>

<div class="header">Dashboard de Accesos</div>

<div class="cards">
  <div class="card">
    <h3>Ingresos</h3>
    <p id="ingresos">0</p>
  </div>

  <div class="card">
    <h3>Salidas</h3>
    <p id="salidas">0</p>
  </div>

  <div class="card">
    <h3>Dentro</h3>
    <p id="dentro">0</p>
  </div>
</div>

<div class="container">

<select id="filtroRol" onchange="renderTabla()">
  <option value="">Todos</option>
  <option value="VISITANTE">VISITANTE</option>
  <option value="CONTRATISTA">CONTRATISTA</option>
  <option value="PROVEEDOR">PROVEEDOR</option>
</select>

<canvas id="grafico"></canvas>

<table>
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Documento</th>
      <th>Rol</th>
      <th>Tipo</th>
      <th>Fecha</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?tqx=out:json";

let registros = [];

async function cargarDatos(){
  try{
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0,-2));

    registros = json.table.rows.map(r => {
      const c = (r.c || []).map(x => x ? x.v : "");

      return {
        tipo: c[1], // INGRESO / SALIDA
        rol: c[2],
        nombre: c[3],
        documento: c[4],
        fecha: formatearFecha(c[0])
      }
    });

    procesar();

  }catch(e){
    alert("Error cargando datos");
  }
}

/* FORMATEAR FECHA BONITA */
function formatearFecha(fechaRaw){

  if(!fechaRaw) return "";

  if(typeof fechaRaw === "string" && fechaRaw.includes("Date")){
    const partes = fechaRaw.match(/\d+/g);
    return new Date(
      partes[0],
      partes[1],
      partes[2],
      partes[3] || 0,
      partes[4] || 0
    ).toLocaleString();
  }

  return new Date(fechaRaw).toLocaleString();
}

/* PROCESAR CONTADORES */
function procesar(){

  let ingresos = registros.filter(r => r.tipo === "INGRESO").length;
  let salidas = registros.filter(r => r.tipo === "SALIDA").length;

  document.getElementById("ingresos").innerText = ingresos;
  document.getElementById("salidas").innerText = salidas;
  document.getElementById("dentro").innerText = ingresos - salidas;

  renderTabla();
  renderGrafico();
}

/* TABLA */
function renderTabla(){

  const filtro = document.getElementById("filtroRol").value;

  let data = registros;

  if(filtro){
    data = data.filter(r => r.rol === filtro);
  }

  const tbody = document.getElementById("tabla");
  tbody.innerHTML = "";

  data.slice().reverse().forEach(r => {
    tbody.innerHTML += `
      <tr>
        <td>${r.nombre}</td>
        <td>${r.documento}</td>
        <td>${r.rol}</td>
        <td>${r.tipo}</td>
        <td>${r.fecha}</td>
      </tr>
    `;
  });
}

/* GRAFICO */
function renderGrafico(){

  const roles = {
    VISITANTE:0,
    CONTRATISTA:0,
    PROVEEDOR:0
  };

  registros.forEach(r => {
    if(roles[r.rol] !== undefined){
      roles[r.rol]++;
    }
  });

  new Chart(document.getElementById("grafico"), {
    type: "bar",
    data: {
      labels: Object.keys(roles),
      datasets: [{
        label: "Registros",
        data: Object.values(roles)
      }]
    }
  });
}

/* AUTO REFRESH (cada 30 segundos) */
setInterval(cargarDatos, 30000);

cargarDatos();

</script>

</body>
</html>
