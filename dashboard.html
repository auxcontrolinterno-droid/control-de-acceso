<script>

document.addEventListener("DOMContentLoaded", () => {
  iniciarDashboard();
});

function $(id){
  return document.getElementById(id);
}

/* =========================
   CONFIG
========================= */

const URL_INGRESOS =
"https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";

const URL_SALIDAS =
"https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=366969943&tqx=out:json";

/* =========================
   INIT
========================= */

function iniciarDashboard(){

  try{

    renderBase(); // 🔥 siempre dibuja estructura

    cargarDatos();

    setInterval(cargarDatos, 8000);

    setInterval(reloj, 1000);

  }catch(e){
    console.error(e);
    document.body.innerHTML = "❌ Error crítico dashboard: " + e;
  }

}

/* =========================
   ESTRUCTURA BASE (ANTI-BLANCO)
========================= */

function renderBase(){

  if(document.getElementById("dashboard_inicial")) return;

  document.body.innerHTML = `
    <div style="font-family:Arial;padding:20px">

      <h2>📊 Dashboard Control de Acceso</h2>

      <div id="estado">Cargando...</div>
      <div>Ingresos hoy: <b id="ingresos">0</b></div>
      <div>Salidas hoy: <b id="salidas">0</b></div>
      <div>Actualizado: <span id="actualizado">--</span></div>

      <hr>

      <table border="1" width="100%">
        <thead>
          <tr>
            <th>Hora</th>
            <th>Nombre</th>
            <th>Rol</th>
            <th>Tipo</th>
          </tr>
        </thead>
        <tbody id="tabla"></tbody>
      </table>

      <hr>

      <h3>Contratistas activos</h3>
      <div id="dentro">0</div>
      <div id="listaDentro"></div>

    </div>
  `;

}

/* =========================
   FETCH SEGURO
========================= */

async function leer(url){

  try{
    const r = await fetch(url);
    const t = await r.text();

    const json = JSON.parse(t.substring(47).slice(0,-2));

    return json.table.rows.map(r => (r.c || []).map(x => x ? x.v : ""));

  }catch(e){
    console.error("Error sheet:", e);
    return [];
  }

}

/* =========================
   FECHA
========================= */

function convertir(v){

  if(!v) return null;

  if(typeof v === "number"){
    return new Date((v - 25569) * 86400 * 1000);
  }

  const d = new Date(v);
  return isNaN(d) ? null : d;

}

function esHoy(v){

  const f = convertir(v);
  if(!f) return false;

  const h = new Date();

  return f.getDate()===h.getDate() &&
         f.getMonth()===h.getMonth() &&
         f.getFullYear()===h.getFullYear();

}

function hora(v){

  const f = convertir(v);
  if(!f) return "--";

  return f.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

}

/* =========================
   CORE
========================= */

async function cargarDatos(){

  try{

    const ingresosRaw = await leer(URL_INGRESOS);
    const salidasRaw = await leer(URL_SALIDAS);

    const ingresos = ingresosRaw.filter(f => esHoy(f[10]));
    const salidas = salidasRaw.filter(f => esHoy(f[10]));

    if($("ingresos")) $("ingresos").innerText = ingresos.length;
    if($("salidas")) $("salidas").innerText = salidas.length;

    if($("actualizado")) $("actualizado").innerText = new Date().toLocaleTimeString();

    renderMovimientos(ingresos, salidas);
    renderContratistas(ingresos, salidas);

    if($("estado")) $("estado").innerText = "🟢 Online";

  }catch(e){
    console.error(e);
    if($("estado")) $("estado").innerText = "🔴 Error";
  }

}

/* =========================
   MOVIMIENTOS
========================= */

function renderMovimientos(ingresos, salidas){

  let mov = [];

  ingresos.forEach(f=>{
    mov.push({
      h:f[9],
      n:f[0],
      r:f[2],
      t:"Ingreso"
    });
  });

  salidas.forEach(f=>{
    mov.push({
      h:f[9],
      n:f[0],
      r:f[2],
      t:"Salida"
    });
  });

  mov.sort((a,b)=> new Date(b.h) - new Date(a.h));
  mov = mov.slice(0,10);

  const tb = $("tabla");
  if(!tb) return;

  tb.innerHTML = mov.map(m=>`
    <tr>
      <td>${hora(m.h)}</td>
      <td>${m.n}</td>
      <td>${m.r}</td>
      <td>${m.t}</td>
    </tr>
  `).join("");

}

/* =========================
   CONTRATISTAS
========================= */

function renderContratistas(ingresos, salidas){

  let sal = new Set(salidas.map(x=>x[1]));
  let list = [];

  ingresos.forEach(f=>{
    if(String(f[2]).toUpperCase()==="CONTRATISTA"){
      if(!sal.has(f[1])){
        list.push(f[0]);
      }
    }
  });

  if($("dentro")) $("dentro").innerText = list.length;

  if($("listaDentro")){
    $("listaDentro").innerHTML =
      list.length ? list.map(n=>`<div>${n}</div>`).join("")
                  : "Sin contratistas activos";
  }

}

/* =========================
   RELOJ
========================= */

function reloj(){
  if($("actualizado")){
    $("actualizado").innerText = new Date().toLocaleTimeString();
  }
}

</script>
