<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dashboard Control</title>

<style>
body{font-family:Arial;background:#f5f6fa;padding:20px}
.box{background:white;padding:15px;margin-bottom:10px;border-radius:10px}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ddd;padding:5px}
</style>
</head>

<body>

<div class="box">
<h2>📊 Dashboard Control de Acceso</h2>
<div id="estado">Cargando...</div>
</div>

<div class="box">
📥 Ingresos hoy: <b id="ingresos">0</b><br>
📤 Salidas hoy: <b id="salidas">0</b>
</div>

<div class="box">
<table>
<thead>
<tr>
<th>Hora</th>
<th>Nombre</th>
<th>Rol</th>
<th>Tipo</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<script>

/* =========================
   SHEETS (INGRESOS / SALIDAS)
========================= */

const URL_INGRESOS =
"https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964";

const URL_SALIDAS =
"https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=366969943";

/* =========================
   SAFE PARSER
========================= */

async function readSheet(url){

  try{

    const r = await fetch(url);
    const t = await r.text();

    const json = JSON.parse(t.substring(47).slice(0,-2));

    return (json.table.rows || []).map(r=>{
      const c = (r.c || []).map(x => x ? x.v : "");

      return {
        nombre:c[0],
        doc:c[1],
        rol:c[2],
        hora:c[9],
        fecha:c[10]
      };

    });

  }catch(e){
    console.log("ERROR:", e);
    return [];
  }

}

/* =========================
   FECHA HOY
========================= */

function isToday(v){
  if(!v) return false;
  const d = new Date(v);
  if(isNaN(d)) return false;

  const n = new Date();

  return d.getDate()==n.getDate() &&
         d.getMonth()==n.getMonth() &&
         d.getFullYear()==n.getFullYear();
}

/* =========================
   HORA
========================= */

function time(v){
  const d = new Date(v);
  if(isNaN(d)) return "--";

  return d.toLocaleTimeString([],{
    hour:"2-digit",
    minute:"2-digit"
  });
}

/* =========================
   LOAD
========================= */

async function load(){

  try{

    const ingresosRaw = await readSheet(URL_INGRESOS);
    const salidasRaw = await readSheet(URL_SALIDAS);

    const ingresos = ingresosRaw.filter(x=>isToday(x.fecha));
    const salidas = salidasRaw.filter(x=>isToday(x.fecha));

    document.getElementById("ingresos").innerText = ingresos.length;
    document.getElementById("salidas").innerText = salidas.length;

    let mov = [];

    ingresos.forEach(x=>{
      mov.push({...x, tipo:"Ingreso"});
    });

    salidas.forEach(x=>{
      mov.push({...x, tipo:"Salida"});
    });

    mov = mov.slice(0,10);

    document.getElementById("tabla").innerHTML =
    mov.map(m=>`
      <tr>
        <td>${time(m.hora)}</td>
        <td>${m.nombre}</td>
        <td>${m.rol}</td>
        <td>${m.tipo}</td>
      </tr>
    `).join("");

    document.getElementById("estado").innerText = "🟢 Online";

  }catch(e){

    console.log(e);
    document.getElementById("estado").innerText = "🔴 Error";

  }

}

load();
setInterval(load,5000);

</script>

</body>
</html>
