<script>

/* =========================
   CONFIG
========================= */

const URL_INGRESOS =
"https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";

const URL_SALIDAS =
"https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=366969943&tqx=out:json";

/* =========================
   SAFE DOM
========================= */

const $ = (id) => document.getElementById(id);

/* =========================
   CACHE
========================= */

let lastHash = "";

/* =========================
   HELPERS
========================= */

function safe(v){
return (v ?? "").toString().trim();
}

/* =========================
   FIX PARSER GOOGLE SHEETS
========================= */

function parseGoogleJSON(txt){
try {
const start = txt.indexOf("{");
const end = txt.lastIndexOf("}");
return JSON.parse(txt.slice(start, end + 1));
} catch (e) {
console.error("Parse error:", e);
return null;
}
}

/* =========================
   API SHEETS
========================= */

async function leerSheet(url){
try{
const res = await fetch(url);
const txt = await res.text();

const json = parseGoogleJSON(txt);
if(!json?.table?.rows) return [];

return json.table.rows.map(r =>
(r.c || []).map(x => x ? x.v : "")
);

}catch(e){
console.error("Fetch error:", e);
return [];
}
}

/* =========================
   FECHA
========================= */

function convertirFecha(v){
if(!v) return null;

if(v instanceof Date) return v;

if(typeof v === "number"){
return new Date(Math.round((v - 25569) * 86400 * 1000));
}

if(typeof v === "string"){
const d = new Date(v);
if(!isNaN(d)) return d;
}

if(typeof v==="string" && v.includes("Date(")){
const n=v.match(/\d+/g)?.map(Number);
if(n) return new Date(n[0],n[1],n[2],n[3]||0,n[4]||0,n[5]||0);
}

return null;
}

/* =========================
   HOY
========================= */

function esHoy(v){
const f = convertirFecha(v);
if(!f) return false;

const h = new Date();

return f.getDate() === h.getDate() &&
f.getMonth() === h.getMonth() &&
f.getFullYear() === h.getFullYear();
}

/* =========================
   HORA
========================= */

function hora(v){
const f = convertirFecha(v);
if(!f) return "--";

return f.toLocaleTimeString([],{
hour:'2-digit',minute:'2-digit'
});
}

/* =========================
   DASHBOARD
========================= */

async function cargarDashboard(){

try{

if($("estado")) $("estado").innerText="🟢 Online";

let ingresosRaw = await leerSheet(URL_INGRESOS);
let salidasRaw = await leerSheet(URL_SALIDAS);

let hash = ingresosRaw.length + "-" + salidasRaw.length;

if(hash === lastHash) return;
lastHash = hash;

let ingresos = ingresosRaw.filter(f => esHoy(f[10]));
let salidas = salidasRaw.filter(f => esHoy(f[10]));

if($("ingresos")) $("ingresos").innerText = ingresos.length;
if($("salidas")) $("salidas").innerText = salidas.length;

if($("actualizado"))
$("actualizado").innerText = new Date().toLocaleTimeString();

ultimosMovimientos(ingresos, salidas);
contratistas(ingresos, salidas);

}catch(e){
console.error(e);
if($("estado")) $("estado").innerText="🔴 Error";
}

}

/* =========================
   MOVIMIENTOS
========================= */

function ultimosMovimientos(ingresos, salidas){

let mov=[];

ingresos.forEach(f=>{
mov.push({
h: f[9],
n: safe(f[0]),
r: safe(f[2]) || "Sin rol",
t: "Ingreso"
});
});

salidas.forEach(f=>{
mov.push({
h: f[9],
n: safe(f[0]),
r: safe(f[2]) || "Sin rol",
t: "Salida"
});
});

mov.sort((a,b)=>convertirFecha(b.h)-convertirFecha(a.h));
mov = mov.slice(0,10);

if(!$("tabla")) return;

$("tabla").innerHTML =
mov.map(m=>`
<tr>
<td>${hora(m.h)}</td>
<td>${m.n}</td>
<td>${m.r}</td>
<td>${
m.t === "Ingreso"
? '<span class="badge-in">Ingreso</span>'
: '<span class="badge-out">Salida</span>'
}</td>
</tr>
`).join("");

}

/* =========================
   CONTRATISTAS
========================= */

function contratistas(ingresos, salidas){

let sal = new Set(salidas.map(x => safe(x[1])));
let map = new Map();

ingresos.forEach(f=>{
if(String(f[2]).toUpperCase() === "CONTRATISTA"){
let doc = safe(f[1]);
if(!sal.has(doc)){
map.set(doc,{
n: safe(f[0]),
e: safe(f[5])
});
}
}
});

let activos = [...map.values()];

if($("dentro")) $("dentro").innerText = activos.length;

if($("listaDentro")){
$("listaDentro").innerHTML =
activos.length
? activos.map(x=>`
<div class="item">
<strong>${x.n}</strong><br>${x.e || "-"}
</div>
`).join("")
: "<div class='item'>Sin contratistas activos</div>";
}

}

/* =========================
   RELOJ
========================= */

function reloj(){
if($("hora")){
$("hora").innerText =
new Date().toLocaleTimeString([],{
hour:'2-digit',minute:'2-digit'
});
}
}

/* =========================
   INIT SEGURO
========================= */

document.addEventListener("DOMContentLoaded", () => {

cargarDashboard();
setInterval(cargarDashboard, 5000);
setInterval(reloj, 1000);

});

</script>
