<script>

/* =========================
   CONFIG
========================= */

const URL_INGRESOS =
"https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=2145380964&tqx=out:json";

const URL_SALIDAS =
"https://docs.google.com/spreadsheets/d/1nf60amlLaZTUmXu9k-IE7DTyl8RmCARJOdP5wuBjMjw/gviz/tq?gid=366969943&tqx=out:json";

/* =========================
   DOM SAFE
========================= */

const $ = (id) => document.getElementById(id);

/* =========================
   CACHE
========================= */

let lastHash = "";

/* =========================
   HELPERS
========================= */

function safe(v){
  return (v ?? "").toString().trim();
}

/* =========================
   PARSER SEGURO GOOGLE SHEETS
========================= */

function parseGoogleJSON(txt){
  try {
    const start = txt.indexOf("{");
    const end = txt.lastIndexOf("}");
    return JSON.parse(txt.slice(start, end + 1));
  } catch (e) {
    console.error("Error parseando JSON:", e);
    return null;
  }
}

/* =========================
   LEER SHEET
========================= */

async function leerSheet(url){
  try{
    const res = await fetch(url);
    const txt = await res.text();

    const json = parseGoogleJSON(txt);
    if(!json?.table?.rows) return [];

    return json.table.rows.map(r => {
      const c = (r.c || []).map(x => x ? x.v : "");

      return {
        nombre: c[0] || "",
        doc: c[1] || "",
        rol: c[2] || "",
        tipoDoc: c[3] || "",
        entidad: c[4] || "",
        placa: c[5] || "",
        contacto: c[6] || "",
        emergencia: c[7] || "",
        parentesco: c[8] || "",
        hora: c[9] || "",
        fecha: c[10] || ""
      };
    });

  } catch(e){
    console.error("Error fetch sheet:", e);
    return [];
  }
}

/* =========================
   FECHA SEGURA
========================= */

function convertirFecha(v){
  if(!v) return null;

  if(v instanceof Date) return v;

  if(typeof v === "number"){
    return new Date(Math.round((v - 25569) * 86400 * 1000));
  }

  if(typeof v === "string"){
    const d = new Date(v);
    if(!isNaN(d)) return d;
  }

  return null;
}

/* =========================
   ES HOY
========================= */

function esHoy(v){
  const f = convertirFecha(v);
  if(!f) return false;

  const h = new Date();

  return (
    f.getDate() === h.getDate() &&
    f.getMonth() === h.getMonth() &&
    f.getFullYear() === h.getFullYear()
  );
}

/* =========================
   HORA
========================= */

function hora(v){
  const f = convertirFecha(v);
  if(!f) return "--";

  return f.toLocaleTimeString([], {
    hour: "2-digit",
    minute: "2-digit"
  });
}

/* =========================
   DASHBOARD
========================= */

async function cargarDashboard(){

  try{

    if($("estado")) $("estado").innerText = "🟢 Online";

    let ingresosRaw = await leerSheet(URL_INGRESOS);
    let salidasRaw = await leerSheet(URL_SALIDAS);

    let hash = ingresosRaw.length + "-" + salidasRaw.length;

    if(hash === lastHash) return;
    lastHash = hash;

    /* FILTRO HOY */
    let ingresos = ingresosRaw.filter(f => esHoy(f.fecha));
    let salidas = salidasRaw.filter(f => esHoy(f.fecha));

    /* CARDS */
    if($("ingresos")) $("ingresos").innerText = ingresos.length;
    if($("salidas")) $("salidas").innerText = salidas.length;

    if($("actualizado"))
      $("actualizado").innerText = new Date().toLocaleTimeString();

    ultimosMovimientos(ingresos, salidas);
    contratistas(ingresos, salidas);

  }catch(e){
    console.error(e);
    if($("estado")) $("estado").innerText = "🔴 Error";
  }

}

/* =========================
   MOVIMIENTOS
========================= */

function ultimosMovimientos(ingresos, salidas){

  let mov = [];

  ingresos.forEach(f=>{
    mov.push({
      h: f.hora,
      n: safe(f.nombre),
      r: safe(f.rol) || "Sin rol",
      t: "Ingreso"
    });
  });

  salidas.forEach(f=>{
    mov.push({
      h: f.hora,
      n: safe(f.nombre),
      r: safe(f.rol) || "Sin rol",
      t: "Salida"
    });
  });

  mov.sort((a,b)=>{
    const da = convertirFecha(a.h)?.getTime() || 0;
    const db = convertirFecha(b.h)?.getTime() || 0;
    return db - da;
  });

  mov = mov.slice(0,10);

  if(!$("tabla")) return;

  $("tabla").innerHTML = mov.map(m => `
    <tr>
      <td>${hora(m.h)}</td>
      <td>${m.n}</td>
      <td>${m.r}</td>
      <td>
        ${m.t === "Ingreso"
          ? '<span class="badge-in">Ingreso</span>'
          : '<span class="badge-out">Salida</span>'}
      </td>
    </tr>
  `).join("");

}

/* =========================
   CONTRATISTAS
========================= */

function contratistas(ingresos, salidas){

  let sal = new Set(salidas.map(x => safe(x.doc)));
  let map = new Map();

  ingresos.forEach(f=>{
    if(String(f.rol).toUpperCase() === "CONTRATISTA"){

      let doc = safe(f.doc);

      if(!sal.has(doc)){
        map.set(doc,{
          n: f.nombre,
          e: f.contacto
        });
      }

    }
  });

  let activos = [...map.values()];

  if($("dentro")) $("dentro").innerText = activos.length;

  if($("listaDentro")){
    $("listaDentro").innerHTML =
      activos.length
        ? activos.map(x=>`
            <div class="item">
              <strong>${x.n}</strong><br>${x.e || "-"}
            </div>
          `).join("")
        : "<div class='item'>Sin contratistas activos</div>";
  }

}

/* =========================
   RELOJ
========================= */

function reloj(){
  if($("hora")){
    $("hora").innerText = new Date().toLocaleTimeString([], {
      hour:"2-digit",
      minute:"2-digit"
    });
  }
}

/* =========================
   INIT SEGURO
========================= */

document.addEventListener("DOMContentLoaded", () => {
  cargarDashboard();
  setInterval(cargarDashboard, 5000);
  setInterval(reloj, 1000);
});

</script>
